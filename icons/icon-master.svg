<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f5132"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flask" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="130" y="226" width="252" height="184" rx="18"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- デコドット -->
  <circle cx="80"  cy="80"  r="4" fill="#34d399" opacity="0.18"/>
  <circle cx="440" cy="100" r="5" fill="#34d399" opacity="0.15"/>
  <circle cx="60"  cy="420" r="3" fill="#34d399" opacity="0.12"/>
  <circle cx="460" cy="440" r="4" fill="#34d399" opacity="0.14"/>

  <!-- 左葉 -->
  <ellipse cx="168" cy="196" rx="80" ry="34" fill="#86efac" opacity="0.88"
           transform="rotate(-20 168 196)"/>
  <line x1="100" y1="200" x2="230" y2="192" stroke="#15803d" stroke-width="2" opacity="0.4"/>

  <!-- 右葉 -->
  <ellipse cx="344" cy="196" rx="80" ry="34" fill="#4ade80" opacity="0.88"
           transform="rotate(20 344 196)"/>
  <line x1="282" y1="190" x2="412" y2="198" stroke="#15803d" stroke-width="2" opacity="0.4"/>

  <!-- 茎 -->
  <line x1="256" y1="155" x2="256" y2="226" stroke="#4ade80" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="192" x2="180" y2="196" stroke="#4ade80" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="192" x2="332" y2="196" stroke="#4ade80" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- フラスコ首 -->
  <rect x="216" y="138" width="80" height="96" rx="10"
        fill="url(#flask)" opacity="0.90" filter="url(#shadow)"/>
  <rect x="226" y="148" width="28" height="76" rx="6" fill="white" opacity="0.18"/>

  <!-- 口リム -->
  <rect x="204" y="130" width="104" height="18" rx="9"
        fill="#a7f3d0" opacity="0.95"/>

  <!-- フラスコ本体 -->
  <rect x="130" y="226" width="252" height="184" rx="18"
        fill="url(#flask)" opacity="0.90" filter="url(#shadow)"/>
  <!-- ボディハイライト -->
  <rect x="148" y="240" width="72" height="100" rx="8" fill="white" opacity="0.12"/>

  <!-- 液体 -->
  <g clip-path="url(#bodyClip)">
    <rect x="130" y="320" width="252" height="90" fill="url(#liquid)" opacity="0.88"/>
    <!-- 波 -->
    <path d="M130 322 Q173 312 216 322 Q259 332 302 322 Q345 312 382 322 L382 330 Q345 342 302 332 Q259 322 216 332 Q173 342 130 330 Z"
          fill="#6ee7b7" opacity="0.50"/>
    <!-- 気泡 -->
    <circle cx="182" cy="365" r="8"  fill="white" opacity="0.45"/>
    <circle cx="220" cy="380" r="5"  fill="white" opacity="0.38"/>
    <circle cx="316" cy="358" r="7"  fill="white" opacity="0.42"/>
    <circle cx="280" cy="375" r="4"  fill="white" opacity="0.48"/>
    <circle cx="256" cy="348" r="10" fill="white" opacity="0.32"/>
  </g>

  <!-- 星（右上） -->
  <path d="M404 104 L410 122 L428 122 L414 133 L420 151 L404 140 L388 151 L394 133 L380 122 L398 122 Z"
        fill="#fde68a" opacity="0.92"/>
  <!-- 小星（左上） -->
  <path d="M116 130 L119 140 L130 140 L121 146 L124 156 L116 150 L108 156 L111 146 L102 140 L113 140 Z"
        fill="#a7f3d0" opacity="0.72"/>
  <!-- ドット -->
  <circle cx="450" cy="210" r="5" fill="#fde68a" opacity="0.70"/>
  <circle cx="62"  cy="255" r="4" fill="#a7f3d0" opacity="0.60"/>

  <!-- 外枠アクセント -->
  <rect width="512" height="512" rx="112" fill="none"
        stroke="#a7f3d0" stroke-width="3" opacity="0.12"/>
</svg>
