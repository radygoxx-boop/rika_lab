<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f0faf5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rika Lab" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <title>Rika Lab ✦</title>
  <style>
/* =============================================
   RIKA LAB — Complete Stylesheet
   Design: Light botanical × Gen Z editorial
   ============================================= */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --c-bg:       #f0faf5;
  --c-bg2:      #e6f7ef;
  --c-surface:  rgba(255,255,255,0.80);
  --c-border:   rgba(16,120,80,0.13);
  --c-border2:  rgba(16,120,80,0.07);
  --c-text:     #0f2d1e;
  --c-muted:    #6b9080;
  --c-mint:     #059669;
  --c-teal:     #0d9488;
  --c-sky:      #0284c7;
  --c-green:    #16a34a;
  --c-pink:     #db2777;
  --c-gold:     #d97706;
  --c-orange:   #ea580c;
  --c-violet:   #7c3aed;
  --nav-h:      70px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

#app {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100svh;
  margin: 0 auto;
  overflow: hidden;
  background: linear-gradient(165deg, #f0faf5 0%, #e8f7f0 40%, #dff4eb 100%);
}

/* ---- BACKGROUND ORBS ---- */
.orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 12s ease-in-out infinite alternate;
}
.orb1 { width: 340px; height: 340px; top: -100px; right: -100px;
  background: radial-gradient(circle, rgba(5,150,105,0.10) 0%, transparent 70%); animation-delay: 0s; }
.orb2 { width: 280px; height: 280px; bottom: 100px; left: -120px;
  background: radial-gradient(circle, rgba(13,148,136,0.08) 0%, transparent 70%); animation-delay: -4s; }
.orb3 { width: 200px; height: 200px; top: 45%; right: -60px;
  background: radial-gradient(circle, rgba(2,132,199,0.07) 0%, transparent 70%); animation-delay: -8s; }

@keyframes orbFloat {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(20px, -30px) scale(1.1); }
}

/* ---- SCREENS ---- */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  z-index: 1;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
  -webkit-overflow-scrolling: touch;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}
.screen::-webkit-scrollbar { display: none; }

/* ---- TOP HEADER ---- */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 52px 22px 16px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #059669 0%, #0d9488 60%, #0284c7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo sup {
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 600;
  opacity: 0.7;
}
.streak-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(217,119,6,0.10);
  border: 1px solid rgba(217,119,6,0.25);
  border-radius: 20px;
  padding: 6px 12px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--c-gold);
}

/* ---- HERO SECTION ---- */
.hero {
  padding: 4px 22px 20px;
}
.hero-sub {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--c-muted);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero-heading {
  font-size: 28px;
  font-weight: 900;
  line-height: 1.25;
  letter-spacing: -0.5px;
}
.hero-heading .accent {
  background: linear-gradient(135deg, #059669, #0284c7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ---- SECTION LABEL ---- */
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--c-muted);
  text-transform: uppercase;
  padding: 0 22px;
  margin-bottom: 12px;
}

/* ---- RANDOM BANNER ---- */
.random-banner {
  margin: 0 22px 24px;
  background: linear-gradient(135deg, rgba(5,150,105,0.08) 0%, rgba(2,132,199,0.06) 100%);
  border: 1px solid rgba(5,150,105,0.22);
  border-radius: 22px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.18s, border-color 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.random-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(5,150,105,0.06), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.random-banner:active { transform: scale(0.97); }
.random-banner:active::before { opacity: 1; }
.random-icon-wrap {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(5,150,105,0.15), rgba(2,132,199,0.10));
  border: 1px solid rgba(5,150,105,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.random-info { flex: 1; }
.random-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  background: linear-gradient(135deg, #059669, #0284c7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 3px;
}
.random-desc { font-size: 11px; color: var(--c-muted); line-height: 1.5; }
.random-badge {
  background: linear-gradient(135deg, rgba(5,150,105,0.12), rgba(2,132,199,0.08));
  border: 1px solid rgba(5,150,105,0.25);
  border-radius: 8px;
  padding: 4px 8px;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--c-teal);
  flex-shrink: 0;
}

/* ---- UNIT GRID ---- */
.unit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 22px;
}
.grade-unit-grid {
  padding: 0 0 4px;
}

/* ---- GRADE ACCORDION ---- */
#grade-accordion {
  padding: 0 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.grade-section {
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(5,150,105,0.12);
  background: rgba(255,255,255,0.7);
  box-shadow: 0 2px 10px rgba(5,150,105,0.06);
}
.grade-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.grade-header:active { background: rgba(5,150,105,0.04); }
.grade-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.grade-badge {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.grade-header-info { min-width: 0; }
.grade-header-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--c-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.grade-desc {
  font-size: 10px;
  font-weight: 400;
  color: var(--c-muted);
  margin-left: 4px;
}
.grade-progress-text {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  color: var(--c-muted);
  margin-top: 1px;
}
.grade-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.grade-mini-bar {
  width: 48px;
  height: 4px;
  background: rgba(5,150,105,0.12);
  border-radius: 2px;
  overflow: hidden;
}
.grade-mini-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.grade-chevron {
  font-size: 9px;
  color: var(--c-muted);
  transition: transform 0.25s;
}
.grade-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0 14px;
}
.grade-body.open {
  max-height: 2000px;
  padding: 0 14px 14px;
}

.unit-card {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(16,120,80,0.12);
  border-radius: 22px;
  padding: 18px 16px 14px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.18s, border-color 0.2s;
  box-shadow: 0 2px 12px rgba(5,150,105,0.07);
}
.unit-card:active { transform: scale(0.96); }
.unit-card-glow {
  position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0.35;
  transition: opacity 0.3s;
}
.unit-card:active .unit-card-glow { opacity: 0.55; }
.unit-emoji { font-size: 30px; margin-bottom: 10px; display: block; }
.unit-name {
  font-size: 12px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 12px;
  color: var(--c-text);
}
.unit-progress {
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  margin-bottom: 10px;
  overflow: hidden;
}
.unit-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--c-mint), var(--c-sky));
  transition: width 0.5s;
}
.unit-levels {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.lvl-btn {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 4px 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  flex: 1;
  text-align: center;
}
.lvl-btn:active { transform: scale(0.93); opacity: 0.8; }
.lvl-easy   { background: rgba(22,163,74,0.10); color: #16a34a; border: 1px solid rgba(22,163,74,0.28); }
.lvl-normal { background: rgba(2,132,199,0.10); color: #0284c7; border: 1px solid rgba(2,132,199,0.28); }
.lvl-hard   { background: rgba(219,39,119,0.08); color: #db2777; border: 1px solid rgba(219,39,119,0.25); }
.unit-point-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--c-border);
  border-radius: 10px;
  padding: 6px 8px;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--c-gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: background 0.15s, border-color 0.15s;
}
.unit-point-btn:active { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }

/* ---- QUIZ SCREEN ---- */
.quiz-topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 52px 22px 16px;
}
.back-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: rgba(255,255,255,0.9);
  border: 1px solid rgba(16,120,80,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--c-text);
  flex-shrink: 0;
  transition: background 0.15s;
  box-shadow: 0 1px 4px rgba(5,150,105,0.08);
}
.back-btn:active { background: rgba(240,250,245,0.9); }
.back-btn svg { width: 18px; height: 18px; }
.quiz-meta { flex: 1; min-width: 0; }
.quiz-unit-name {
  font-size: 11px;
  color: var(--c-muted);
  font-family: 'Syne', sans-serif;
  letter-spacing: 1.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.quiz-level-chip {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 8px;
  margin-top: 3px;
}
.chip-easy   { background: rgba(22,163,74,0.10); color: #15803d; }
.chip-normal { background: rgba(2,132,199,0.10); color: #0369a1; }
.chip-hard   { background: rgba(219,39,119,0.08); color: #be185d; }
.chip-mix    { background: rgba(124,58,237,0.08); color: #6d28d9; }
.quiz-counter {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--c-muted);
  flex-shrink: 0;
}
.quiz-counter span { color: var(--c-text); }

.progress-wrap {
  margin: 0 22px 20px;
  height: 3px;
  background: rgba(5,150,105,0.12);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #059669, #0d9488, #0284c7);
  transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}

.question-wrap { padding: 0 22px; }
.question-card {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(5,150,105,0.13);
  border-radius: 24px;
  padding: 24px 22px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(5,150,105,0.08);
}
.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, #059669, #0d9488, #0284c7);
}
.q-num {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--c-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.q-num::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--c-border);
}
.q-text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.65;
  letter-spacing: 0.3px;
}

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(5,150,105,0.13);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.18s;
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  color: var(--c-text);
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.5;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(5,150,105,0.05);
}
.choice:not(:disabled):active { transform: scale(0.98); }
.choice:not(:disabled):hover {
  background: rgba(240,250,245,0.95);
  border-color: rgba(5,150,105,0.25);
  transform: translateX(3px);
}
.choice:disabled { cursor: default; }
.choice-key {
  width: 28px; height: 28px;
  border-radius: 9px;
  background: rgba(5,150,105,0.07);
  border: 1px solid rgba(5,150,105,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.18s;
  color: var(--c-muted);
}
.choice.correct {
  background: rgba(22,163,74,0.08);
  border-color: rgba(22,163,74,0.40);
  color: #15803d;
}
.choice.correct .choice-key {
  background: #16a34a;
  border-color: #16a34a;
  color: #fff;
}
.choice.wrong {
  background: rgba(219,39,119,0.05);
  border-color: rgba(219,39,119,0.20);
  color: var(--c-muted);
}
.choice.wrong .choice-key {
  background: rgba(219,39,119,0.10);
  border-color: rgba(219,39,119,0.25);
  color: #db2777;
}
.choice-shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(22,163,74,0.07), transparent);
  transform: translateX(-100%);
  animation: shimmer 0.5s ease forwards;
}
@keyframes shimmer { to { transform: translateX(100%); } }

.explanation-card {
  margin-top: 12px;
  background: linear-gradient(135deg, rgba(5,150,105,0.07), rgba(2,132,199,0.04));
  border: 1px solid rgba(5,150,105,0.20);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.explanation-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.explanation-text { font-size: 12px; line-height: 1.7; color: #065f46; }

.next-btn {
  width: 100%;
  margin-top: 16px;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #059669, #0d9488);
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 14px rgba(5,150,105,0.25);
}
.next-btn:active { opacity: 0.88; transform: scale(0.98); }

/* ---- RESULT SCREEN ---- */
.result-screen {
  padding: 52px 22px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: calc(100svh - var(--nav-h) - var(--safe-bottom));
}
.result-stars {
  font-size: 40px;
  letter-spacing: 4px;
  margin-bottom: 16px;
  animation: starPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes starPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-score-ring {
  width: 140px; height: 140px;
  margin-bottom: 24px;
  position: relative;
}
.result-score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(5,150,105,0.12); stroke-width: 6; }
.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 339.3;
  stroke-dashoffset: 339.3;
  transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1) 0.3s;
}
.result-score-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.result-score-num {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #059669, #0284c7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.result-score-total { font-size: 13px; color: var(--c-muted); margin-top: 4px; }
.result-message {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 6px;
  text-align: center;
}
.result-sub {
  font-size: 12px;
  color: var(--c-muted);
  margin-bottom: 28px;
  text-align: center;
  line-height: 1.6;
}
.earned-badges {
  width: 100%;
  margin-bottom: 28px;
}
.earned-badges-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--c-muted);
  text-align: center;
  margin-bottom: 12px;
}
