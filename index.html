  { id:2,  unit:'g4_plants', level:'easy',   q:'植物の葉が緑色なのはなぜ？', choices:['水分が多いから','葉緑体があるから','空気を含むから','根から色素が来るから'], answer:1, exp:'葉には葉緑体があり、その中の緑色の色素（クロロフィル）が葉を緑に見せているよ！' },
  { id:3,  unit:'g4_plants', level:'easy',   q:'根が水を吸い上げるとき、葉では何が起きている？', choices:['光合成','呼吸','蒸散','発芽'], answer:2, exp:'葉の気孔から水蒸気が蒸散することで、根から水を吸い上げる力（引っ張り上げる力）が生まれるよ！' },
  { id:4,  unit:'g4_plants', level:'easy',   q:'春に最初に咲く花として有名なのはどれ？', choices:['ヒマワリ','コスモス','アブラナ（菜の花）','アサガオ'], answer:2, exp:'アブラナ（菜の花）は春の代表的な植物。桜と同じ時期に黄色い花を咲かせるよ！' },
  { id:5,  unit:'g4_plants', level:'easy',   q:'植物が光を使ってデンプンをつくる働きは？', choices:['呼吸','蒸散','光合成','吸水'], answer:2, exp:'光合成は葉が光エネルギーを使って二酸化炭素と水からデンプンをつくる働き！' },
  { id:6,  unit:'g4_plants', level:'normal', q:'インゲンマメの発芽実験で、光を当てた種と暗所の種の結果は？', choices:['光に当てた方が先に発芽','暗所の方が先に発芽','両方同じタイミングで発芽','暗所の種は発芽しない'], answer:2, exp:'発芽に光は関係ない！水・温度・空気が同じなら、明るさに関わらず同時に発芽するよ。' },
  { id:7,  unit:'g4_plants', level:'normal', q:'植物の成長に必要で、発芽には不要なものは？', choices:['水','空気','適切な温度','光と肥料'], answer:3, exp:'発芽には光・肥料は不要。でも成長するには光合成のための光と、栄養のための肥料が必要になるよ！' },
  { id:8,  unit:'g4_plants', level:'normal', q:'デンプンの検出に使う試薬は？', choices:['リトマス試験紙','ヨウ素液','BTB溶液','フェノールフタレイン'], answer:1, exp:'ヨウ素液（ヨウ素ヨウ化カリウム溶液）はデンプンと反応して青紫色に変わるよ！理科実験の基本！' },
  { id:9,  unit:'g4_plants', level:'normal', q:'切り花を色水に差すと花びらが染まる。この現象を説明するものは？', choices:['師管が水を運ぶ','道管が水を運ぶ','気孔が水を吸う','根毛が水を吸う'], answer:1, exp:'道管は根から水を葉・花へ運ぶ管。色水が道管を通って花びらまで届くから染まるよ！' },
  { id:10, unit:'g4_plants', level:'hard',   q:'ホウセンカに赤い色水を吸わせて茎を輪切りにすると、どこが赤くなる？', choices:['茎の中心部全体','茎の外側の皮の部分','茎の特定の管（道管）','茎全体が均一に赤くなる'], answer:2, exp:'道管は茎の中に束になって分布している。色水がその道管だけを通るので、切り口の特定の管が赤く染まるよ！' },
  { id:11, unit:'g4_plants', level:'hard',   q:'植物が夜間に行う呼吸について正しいのは？', choices:['昼だけ呼吸する','夜だけ呼吸する','昼夜関係なく呼吸する','光合成と同時にしか呼吸しない'], answer:2, exp:'植物は昼も夜も常に呼吸している。昼は光合成の方が呼吸より活発なので、見た目は酸素を出しているように見えるよ！' },
  { id:12, unit:'g4_plants', level:'hard',   q:'双子葉植物と単子葉植物の根の違いは？', choices:['双子葉→ひげ根・単子葉→主根と側根','双子葉→主根と側根・単子葉→ひげ根','両方ともひげ根','両方とも主根と側根'], answer:1, exp:'双子葉植物（アサガオ・ホウセンカ）は主根から側根が出る。単子葉植物（イネ・トウモロコシ）はひげ根！' },

  // ----- g4_animals -----
  { id:13, unit:'g4_animals', level:'easy',   q:'完全変態をする昆虫はどれ？', choices:['バッタ','トンボ','チョウ','セミ'], answer:2, exp:'チョウは卵→幼虫→さなぎ→成虫と変態する「完全変態」の昆虫。バッタ・トンボ・セミは「不完全変態」だよ！' },
  { id:14, unit:'g4_animals', level:'easy',   q:'昆虫の体の特徴として正しいのは？', choices:['足が8本','体が2つに分かれる','足が6本・体が3つに分かれる','背骨がある'], answer:2, exp:'昆虫は体が「頭・胸・腹」の3つに分かれ、足は6本。触角は2本！この3つを覚えよう！' },
  { id:15, unit:'g4_animals', level:'easy',   q:'魚が呼吸に使う器官は？', choices:['肺','えら','皮膚','気管'], answer:1, exp:'魚はえら呼吸。水中の酸素をえらで取り込む。カエルの幼生（おたまじゃくし）もえら呼吸だよ！' },
  { id:16, unit:'g4_animals', level:'easy',   q:'冬眠する動物として正しいのは？', choices:['イルカ','ペンギン','クマ','スズメ'], answer:2, exp:'クマ・カエル・ヘビ・コウモリなどが冬眠する。体温を下げてエネルギーを節約して冬を越すよ！' },
  { id:17, unit:'g4_animals', level:'easy',   q:'渡り鳥として日本の夏に見られるのはどれ？', choices:['ハクチョウ','ツバメ','マガモ','ツル'], answer:1, exp:'ツバメは春に東南アジアから来て夏を過ごし、秋に南へ帰る渡り鳥。ハクチョウは冬に来るよ！' },
  { id:18, unit:'g4_animals', level:'normal', q:'不完全変態の昆虫はどれ？', choices:['カブトムシ','ハチ','アリ','バッタ'], answer:3, exp:'バッタ・トンボ・セミ・ゴキブリは不完全変態（さなぎの時期なし）。カブトムシ・ハチ・アリは完全変態！' },
  { id:19, unit:'g4_animals', level:'normal', q:'鳥類の特徴として正しいのは？', choices:['変温動物・えら呼吸','恒温動物・肺呼吸・卵生','変温動物・肺呼吸・胎生','恒温動物・えら呼吸・卵生'], answer:1, exp:'鳥類は恒温動物（体温一定）・肺呼吸・卵生・背骨あり・羽毛がある。飛べない鳥（ペンギンなど）も鳥類！' },
  { id:20, unit:'g4_animals', level:'normal', q:'クモは昆虫か？その理由は？', choices:['昆虫・足が8本','昆虫ではない・足が8本','昆虫・体が2つに分かれる','昆虫ではない・背骨がある'], answer:1, exp:'クモは足が8本・体が頭胸部と腹部の2つ。昆虫は足6本・体3つ。クモは昆虫ではなく、クモ類！' },
  { id:21, unit:'g4_animals', level:'normal', q:'両生類が成体になったとき、幼生と異なる点は？', choices:['水中でしか生きられなくなる','えら呼吸に変わる','陸上で生活し肺と皮膚で呼吸する','変温動物でなくなる'], answer:2, exp:'カエルの成体は肺呼吸＋皮膚呼吸で陸上生活できるよ。幼生（おたまじゃくし）はえら呼吸で水中生活！' },
  { id:22, unit:'g4_animals', level:'hard',   q:'ザリガニはどの動物グループに属する？', choices:['昆虫類','クモ類','甲殻類','軟体動物'], answer:2, exp:'ザリガニは甲殻類。エビ・カニと同じ仲間。外骨格・多くの足がある。昆虫・クモとは異なるよ！' },
  { id:23, unit:'g4_animals', level:'hard',   q:'イカ・タコが属するグループは？', choices:['甲殻類','軟体動物','脊椎動物','環形動物'], answer:1, exp:'イカ・タコ・貝は軟体動物。柔らかい体・内臓を覆う外套膜が特徴。背骨はないが高い知能を持つよ！' },
  { id:24, unit:'g4_animals', level:'hard',   q:'食物連鎖で生産者と呼ばれるのは？', choices:['草食動物','肉食動物','植物','分解者（菌類・細菌）'], answer:2, exp:'植物は光合成でエネルギーを生産するから「生産者」。草食・肉食動物は「消費者」。菌類は「分解者」！' },

  // ----- g4_body -----
  { id:25, unit:'g4_body', level:'easy',   q:'食べ物から栄養を吸収する主な器官は？', choices:['胃','大腸','小腸','肝臓'], answer:2, exp:'小腸の内壁には細かいひだ（絨毛）があって表面積が大きく、栄養をしっかり吸収できるよ！' },
  { id:26, unit:'g4_body', level:'easy',   q:'血液を全身に送るポンプの役割をする器官は？', choices:['肺','腎臓','心臓','肝臓'], answer:2, exp:'心臓は筋肉でできたポンプ。収縮して血液を押し出し、全身に酸素と栄養を届けるよ！' },
  { id:27, unit:'g4_body', level:'easy',   q:'呼吸で体内に取り込む気体は？', choices:['二酸化炭素','窒素','酸素','水蒸気'], answer:2, exp:'息を吸うとき酸素を取り込み、吐くとき二酸化炭素を出す。酸素は細胞でエネルギーをつくるのに使うよ！' },
  { id:28, unit:'g4_body', level:'easy',   q:'肺の小さな袋状の構造（ガス交換の場所）の名前は？', choices:['腎小体','肺胞','気管支','胸膜'], answer:1, exp:'肺胞は直径0.2mmほどの小さな袋。数億個あって表面積がとても大きく、効率よくガス交換できるよ！' },
  { id:29, unit:'g4_body', level:'easy',   q:'ヨウ素液を使うと青紫色になる栄養素は？', choices:['タンパク質','脂肪','デンプン','ビタミン'], answer:2, exp:'デンプンにヨウ素液をかけると青紫色に変わる！この反応でご飯・パン・イモにデンプンが含まれることがわかるよ。' },
  { id:30, unit:'g4_body', level:'normal', q:'心臓から出た血液が全身を回って戻ってくる経路を何という？', choices:['肺循環','体循環','冠循環','門脈循環'], answer:1, exp:'心臓→全身→心臓の経路が「体循環」。心臓→肺→心臓が「肺循環」。2つの循環で体を流れているよ！' },
  { id:31, unit:'g4_body', level:'normal', q:'だ液に含まれてデンプンを分解する消化酵素は？', choices:['ペプシン','リパーゼ','アミラーゼ','トリプシン'], answer:2, exp:'だ液アミラーゼがデンプンを麦芽糖に分解する。よく噛むとご飯が甘くなるのはこのため！' },
  { id:32, unit:'g4_body', level:'normal', q:'血液の成分で、酸素を運ぶのはどれ？', choices:['白血球','血小板','血漿','赤血球'], answer:3, exp:'赤血球にはヘモグロビンという赤い色素があり、肺で酸素と結合して全身に届けるよ！' },
  { id:33, unit:'g4_body', level:'normal', q:'タンパク質を消化する胃の消化液に含まれる酵素は？', choices:['アミラーゼ','リパーゼ','ペプシン','マルターゼ'], answer:2, exp:'胃液に含まれるペプシンがタンパク質を分解する。胃液は強い酸性（塩酸を含む）でペプシンが働く！' },
  { id:34, unit:'g4_body', level:'hard',   q:'小腸でブドウ糖を吸収した後、最初に運ばれる器官は？', choices:['心臓','肺','肝臓','腎臓'], answer:2, exp:'小腸で吸収したブドウ糖は門脈を通って肝臓へ運ばれ、グリコーゲンとして蓄えられたり血糖として調節されるよ！' },
  { id:35, unit:'g4_body', level:'hard',   q:'腎臓のはたらきとして正しいのは？', choices:['血液を全身に送る','空気から酸素を取り込む','血液から不要物をこして尿をつくる','食べ物を消化する'], answer:2, exp:'腎臓は血液をろ過して老廃物（尿素など）を尿として取り除くよ。1日に約150Lもの血液をろ過する！' },
  { id:36, unit:'g4_body', level:'hard',   q:'反射（はんしゃ）が速い理由として正しいのは？', choices:['脳が素早く判断するから','せきずいで処理されるから','筋肉が自動的に動くから','感覚器官が過敏だから'], answer:1, exp:'反射は脳を通らずせきずいで直接処理されるため速い！熱いものを触ったとき手を引く、など。' },

  // ----- g4_weather -----
  { id:37, unit:'g4_weather', level:'easy',   q:'気温を正しく測る方法はどれ？', choices:['直射日光の当たる場所で測る','日陰・地上1.2〜1.5mの高さで測る','地面に置いた温度計で測る','雨の日は室内で測る'], answer:1, exp:'気温は日陰・風通しの良い場所・地上1.2〜1.5mの高さで測る。直射日光は温度計を温めてしまうよ！' },
  { id:38, unit:'g4_weather', level:'easy',   q:'入道雲（積乱雲）が発達したとき、予想される天気は？', choices:['穏やかな晴れ','霧雨','雷雨・にわか雨','雪'], answer:2, exp:'積乱雲（入道雲）は激しい上昇気流で発達する雲。雷雨や激しいにわか雨の原因になるよ！' },
  { id:39, unit:'g4_weather', level:'easy',   q:'虹はどのような条件でできる？', choices:['太陽と同じ方向・晴れのとき','太陽の反対側・雨上がり','曇り空・雨降り中','夜間・月明かりのとき'], answer:1, exp:'虹は太陽の反対側の空に、雨粒が光を屈折・反射して色を分けることでできるよ！' },
  { id:40, unit:'g4_weather', level:'easy',   q:'雲がないとき（快晴）の夜は気温がどうなりやすい？', choices:['高くなる','変わらない','低くなりやすい（放射冷却）','関係ない'], answer:2, exp:'雲がないと地面から放射された熱が宇宙へ逃げやすく、夜間に気温が下がりやすい（放射冷却）！' },
  { id:41, unit:'g4_weather', level:'easy',   q:'日本の天気は一般的にどの方向から変化する？', choices:['東から西へ','北から南へ','西から東へ','南から北へ'], answer:2, exp:'偏西風の影響で、日本では天気は西から東へ移動するよ。明日の天気を予測するヒントになる！' },
  { id:42, unit:'g4_weather', level:'normal', q:'霧（きり）はどのようにしてできる？', choices:['地面が急速に温まるとき','地面近くの空気が冷やされて水蒸気が水滴になるとき','強い風で砂が舞い上がるとき','海から塩分が飛んでくるとき'], answer:1, exp:'霧は地面近くの空気が冷えて露点以下になり、水蒸気が細かい水滴になって浮かんでいる現象だよ！' },
  { id:43, unit:'g4_weather', level:'normal', q:'天気予報で低気圧が近づくと予報されたら？', choices:['晴れが続くと考える','雨や曇りになると考える','強風だが晴れと考える','関係ない'], answer:1, exp:'低気圧は上昇気流→雲が発達→雨や曇りになりやすい。「低気圧＝悪天候」と覚えよう！' },
  { id:44, unit:'g4_weather', level:'normal', q:'雨の降り方の「しとしと降る雨」と「ざあざあ降る雨」を生む雲の種類は？', choices:['積乱雲と積雲','乱層雲と積乱雲','巻雲と積雲','層雲と乱層雲'], answer:1, exp:'乱層雲（雨雲）はしとしとした長雨。積乱雲（入道雲）はざあざあ激しい雷雨。雲の形で雨の種類がわかるよ！' },
  { id:45, unit:'g4_weather', level:'hard',   q:'露点とは何か？', choices:['雨が降り始める気温','空気中の水蒸気が水滴になり始める温度','最も高い気温','海面の水温'], answer:1, exp:'露点は空気を冷やしたとき水蒸気が凝結して水滴になる温度。露点に達するとコップの外側が曇るよ！' },
  { id:46, unit:'g4_weather', level:'hard',   q:'季節によって日の出・日の入りの位置が変わる理由は？', choices:['地球の公転と地軸の傾きのため','月の引力の影響','太陽の自転のため','大気の状態のため'], answer:0, exp:'地球が地軸を傾けたまま太陽の周りを公転するから、季節によって日の出・日の入りの方向が変わるよ！' },
  { id:47, unit:'g4_weather', level:'hard',   q:'「天気が西から東へ変わる」のに最も関係が深いのは？', choices:['海流（暖流・寒流）','偏西風','モンスーン','コリオリの力'], answer:1, exp:'偏西風（上空を吹く西からの風）が雲や低気圧を西から東へ運ぶ。日本の天気変化の主な原因だよ！' },

  // ----- g4_electricity1 -----
  { id:48, unit:'g4_electricity1', level:'easy',   q:'電気を通す物質（導体）はどれ？', choices:['ガラス','銅（あかがね）','木','プラスチック'], answer:1, exp:'銅などの金属は自由電子を持つため電気を通す導体。ガラス・木・プラスチックは電気を通さない絶縁体！' },
  { id:49, unit:'g4_electricity1', level:'easy',   q:'直列つなぎの豆電球が1つ切れると？', choices:['残りが明るくなる','残りも消える','回路は変わらず残りは点灯する','電流が逆向きになる'], answer:1, exp:'直列は1本の道しかないから、1つ切れると電流が流れなくなって全部消える！並列なら残りは点くよ。' },
  { id:50, unit:'g4_electricity1', level:'easy',   q:'電池の直列つなぎをすると、電球の明るさはどうなる？', choices:['変わらない','暗くなる','明るくなる','消える'], answer:2, exp:'電池を直列につなぐと電圧が増えて電流が大きくなるから、電球が明るくなるよ！' },
  { id:51, unit:'g4_electricity1', level:'easy',   q:'回路図でスイッチを「開く」とはどういう意味？', choices:['電流を流す','電流を止める','電球を外す','電池を逆につける'], answer:1, exp:'スイッチを開く（OFF）と回路が切れて電流が流れなくなる。閉じる（ON）で電流が流れるよ！' },
  { id:52, unit:'g4_electricity1', level:'easy',   q:'電流の向きは電池のどこからどこへ流れる？', choices:['−極から出て＋極へ','＋極から出て−極へ','向きは関係ない','交互に向きが変わる'], answer:1, exp:'電流は＋極から出て外部の回路を通り−極へ戻る（電子は逆向きに動く）。これが電流の向き！' },
  { id:53, unit:'g4_electricity1', level:'normal', q:'乾電池の並列つなぎの特徴は？', choices:['電圧が増えて明るくなる','明るさは同じで長持ちする','暗くなるが長持ちする','明るさが2倍になる'], answer:1, exp:'並列つなぎは電圧が変わらないから明るさは同じ。でも2つの電池から電流が供給されるから長持ちするよ！' },
  { id:54, unit:'g4_electricity1', level:'normal', q:'並列回路の豆電球が1つ切れたとき、残りは？', choices:['全部消える','残りは変わらず点灯する','残りが暗くなる','残りが明るくなる'], answer:1, exp:'並列回路は電球ごとに独立した道がある。1つ切れても他の電球は別の道で電流が流れるから点いたまま！' },
  { id:55, unit:'g4_electricity1', level:'normal', q:'電熱線（ニクロム線）に電流を流すと？', choices:['光るだけ','熱くなる','冷たくなる','磁石になる'], answer:1, exp:'電熱線は電気抵抗が大きいので電流が流れると熱が発生する。電気ストーブやトースターの原理だよ！' },
  { id:56, unit:'g4_electricity1', level:'normal', q:'電流計で電流を測るとき、回路へのつなぎ方は？', choices:['並列につなぐ','直列につなぐ','どちらでも良い','電池の代わりにつなぐ'], answer:1, exp:'電流計は測りたい場所に直列につなぐ。電圧計は並列。この違いを必ず覚えよう！' },
  { id:57, unit:'g4_electricity1', level:'hard',   q:'同じ乾電池2本で豆電球1つを使うとき、直列と並列ではどう違う？', choices:['直列の方が明るい・電池が早く切れる','並列の方が明るい・電池が長持ち','直列の方が明るい・電池が長持ち','両方同じ明るさ・同じ寿命'], answer:0, exp:'直列は電圧2倍→明るい→電流大→電池消費早い。並列は電圧同じ→明るさ同じ→各電池の負担半分→長持ち！' },
  { id:58, unit:'g4_electricity1', level:'hard',   q:'電磁石の力を強くするにはどうすればよいか（2つ正しいものを含む選択肢）？', choices:['コイルの巻き数を増やす・電流を弱くする','コイルの巻き数を減らす・電流を強くする','コイルの巻き数を増やす・電流を強くする','芯を木にする・電流を強くする'], answer:2, exp:'電磁石を強くするには①コイルの巻き数を増やす ②電流を強くする ③鉄芯を太くする の3つが有効！' },
  { id:59, unit:'g4_electricity1', level:'hard',   q:'電流が流れているコイルは何のような性質をもつ？', choices:['熱を発生させるだけ','磁石と同じ性質をもつ','光を出す','重力を変える'], answer:1, exp:'コイルに電流を流すと両端にN極とS極ができ、磁石と同じ性質になる（電磁石）。電気を切ると磁力も消えるよ！' },

  // ----- g5_plants -----
  { id:60, unit:'g5_plants', level:'easy',   q:'受粉とはどういうこと？', choices:['花びらが開くこと','おしべの花粉がめしべの柱頭につくこと','種が土に落ちること','芽が出ること'], answer:1, exp:'受粉はおしべの花粉がめしべの柱頭に付くこと。受粉後に種子と果実がつくられるよ！' },
  { id:61, unit:'g5_plants', level:'easy',   q:'タンポポの種子はどのように散布される？', choices:['水に流されて','動物の毛にくっついて','綿毛で風に乗って','弾き飛ばされて'], answer:2, exp:'タンポポの綿毛は冠毛（かんもう）と呼ばれ、風で遠くへ飛んでいく風散布の代表例！' },
  { id:62, unit:'g5_plants', level:'easy',   q:'単子葉植物の葉脈の特徴は？', choices:['網目状（網状脈）','平行（平行脈）','羽状','扇状'], answer:1, exp:'イネ・トウモロコシ・ユリなどの単子葉植物は葉脈が平行。双子葉植物は網目状（網状脈）だよ！' },
  { id:63, unit:'g5_plants', level:'easy',   q:'花粉を風で運ぶ植物（風媒花）はどれ？', choices:['ヒマワリ','スミレ','イネ・マツ','チューリップ'], answer:2, exp:'イネ・マツ・スギは風で花粉を運ぶ風媒花。花が目立たない・花粉が軽くて多い。花粉症の原因にも！' },
  { id:64, unit:'g5_plants', level:'easy',   q:'胚珠が子房に包まれている植物のグループは？', choices:['裸子植物','シダ植物','被子植物','コケ植物'], answer:2, exp:'被子植物は胚珠が子房に包まれている（アブラナ・ツツジなど）。裸子植物は胚珠がむき出し（マツ・スギ）！' },
  { id:65, unit:'g5_plants', level:'normal', q:'気孔が主に開くのはいつ？', choices:['夜間（光がないとき）','昼間（光があるとき）','乾燥したとき','寒いとき'], answer:1, exp:'気孔は昼間に開いて二酸化炭素を取り込み、水蒸気を出す（蒸散）。夜や乾燥時には閉じることが多いよ！' },
  { id:66, unit:'g5_plants', level:'normal', q:'花のつくりで受粉後に果実になるのは？', choices:['がく','花びら','おしべ','子房（を含む部分）'], answer:3, exp:'受粉後、子房が果実に、胚珠が種子になる。トマトの赤い部分（子房の壁）もリンゴの食べる部分も果実！' },
  { id:67, unit:'g5_plants', level:'normal', q:'コケ植物・シダ植物・種子植物の違いを表す特徴の組み合わせで正しいのは？', choices:['コケ→種子・シダ→胞子・種子→胞子','コケ→胞子（維管束なし）・シダ→胞子（維管束あり）・種子→種子','すべて胞子で繁殖','すべて種子で繁殖'], answer:1, exp:'コケは胞子・維管束なし。シダは胞子・維管束あり。種子植物は種子で繁殖。この3段階が重要！' },
  { id:68, unit:'g5_plants', level:'normal', q:'蒸散が最も活発なのはどのような条件？', choices:['気温が低く・湿度が高い','気温が高く・湿度が低い・風が強い','雨が降っているとき','夜間で光がないとき'], answer:1, exp:'蒸散は気温↑・湿度↓・風↑・光↑の条件で活発になる。乾いた暑い日に葉がたくさん水を出すイメージ！' },
  { id:69, unit:'g5_plants', level:'hard',   q:'光合成の化学反応式として正しいのは？', choices:['CO₂＋O₂→H₂O＋エネルギー','CO₂＋H₂O→有機物＋O₂（光エネルギーを使って）','H₂O→H₂＋O₂','有機物→CO₂＋H₂O'], answer:1, exp:'光合成：CO₂＋H₂O →（光エネルギー）→ 有機物（ブドウ糖）＋O₂。入試頻出！化学式も確認しよう！' },
  { id:70, unit:'g5_plants', level:'hard',   q:'双子葉植物と単子葉植物の茎の断面の違いは？', choices:['双子葉→維管束が散在・単子葉→輪状に並ぶ','双子葉→維管束が輪状・単子葉→散在','両方とも輪状','両方とも散在'], answer:1, exp:'双子葉植物の維管束は輪状に並ぶ（成長輪ができる）。単子葉植物（イネなど）は維管束がバラバラに散在！' },
  { id:71, unit:'g5_plants', level:'hard',   q:'葉でつくられたデンプンはどの形で茎を通って運ばれる？', choices:['デンプンのまま道管を通る','ショ糖（スクロース）として師管を通る','ブドウ糖として道管を通る','アミノ酸として師管を通る'], answer:1, exp:'デンプンはショ糖（スクロース）に変換されて師管を通って植物全体に運ばれる。道管は水・無機塩類専用！' },

  // ----- g5_celestial -----
  { id:72, unit:'g5_celestial', level:'easy',   q:'月の満ち欠けの周期はおよそ何日？', choices:['7日','14日','29.5日','365日'], answer:2, exp:'月の満ち欠けは約29.5日周期。新月→上弦の月→満月→下弦の月→新月と変化するよ！' },
  { id:73, unit:'g5_celestial', level:'easy',   q:'太陽が東から西へ動いて見えるのはなぜ？', choices:['太陽が地球の周りを回っているから','地球が自転しているから','月が太陽を動かすから','地球が公転しているから'], answer:1, exp:'地球が西から東へ自転しているから、太陽が反対の東から西へ動いて見える。1日1回転（約24時間）！' },
  { id:74, unit:'g5_celestial', level:'easy',   q:'日食が起きる条件は？', choices:['満月のとき地球の影に月が入る','新月のとき月が太陽と地球の間に入る','満月のとき月が太陽の前を通る','新月のとき地球が月と太陽の間に入る'], answer:1, exp:'日食は月が太陽を隠すとき。新月で月・太陽・地球がほぼ一直線に並ぶと起きるよ！' },
  { id:75, unit:'g5_celestial', level:'easy',   q:'月食が起きる条件は？', choices:['新月のとき月が太陽の前を通る','満月のとき地球の影に月が入る','新月のとき地球の影に月が入る','半月のとき月が地球の影に入る'], answer:1, exp:'月食は地球の影に満月が入るとき。満月で太陽・地球・月がほぼ一直線に並ぶと起きるよ！' },
  { id:76, unit:'g5_celestial', level:'easy',   q:'地球が太陽の周りを1周するのに何日かかる？', choices:['約30日','約365日','約29.5日','約24時間'], answer:1, exp:'地球は約365日（1年）かけて太陽の周りを公転する。これが季節の変化・見える星座が変わる原因！' },
  { id:77, unit:'g5_celestial', level:'normal', q:'満月から次の満月まで約29.5日かかる理由は？', choices:['月の自転周期が29.5日','月の公転周期（約27.3日）に地球の公転が加わるため','地球の自転が関係する','太陽の引力が変化するため'], answer:1, exp:'月の公転は約27.3日だが、地球も太陽を公転しているので、満月→満月は約29.5日かかる（朔望月）！' },
  { id:78, unit:'g5_celestial', level:'normal', q:'日本で夏に見やすい星座（夏の大三角に含まれるもの）は？', choices:['オリオン座','はくちょう座・わし座・こと座','おおぐま座・こぐま座','さそり座・いて座・てんびん座'], answer:1, exp:'夏の大三角：はくちょう座のデネブ・わし座のアルタイル・こと座のベガでつくる三角形だよ！' },
  { id:79, unit:'g5_celestial', level:'normal', q:'北極星がほぼ動かないのはなぜ？', choices:['地球から最も遠い星だから','地球の自転軸の延長線上にあるから','最も明るい星だから','月との位置関係が固定されているから'], answer:1, exp:'北極星は地球の自転軸（北極点の真上）のほぼ延長線上にあるから、地球が自転しても動いて見えない！' },
  { id:80, unit:'g5_celestial', level:'hard',   q:'月が地球を公転しているとき、月は地球にいつも同じ面を向けている理由は？', choices:['月は自転していないから','月の自転周期と公転周期が同じだから','地球の引力が強すぎて回れないから','月が球体でないから'], answer:1, exp:'月の自転周期≒公転周期（約27.3日）。だから地球からはいつも同じ面（表側）しか見えない！' },
  { id:81, unit:'g5_celestial', level:'hard',   q:'季節によって見える星座が変わるのはなぜ？', choices:['星座の星が移動するから','地球が公転して太陽の反対側の星座しか夜に見えないため','太陽が季節によって位置を変えるから','月の満ち欠けの影響'], answer:1, exp:'地球が公転すると夜に太陽の反対側（深夜に南中する方向）が変わるので、季節ごとに見える星座が変わる！' },
  { id:82, unit:'g5_celestial', level:'hard',   q:'皆既月食のとき、月が真っ暗にならず赤く見える理由は？', choices:['月自身が赤く光るから','地球の大気で屈折した赤い光が月に当たるから','太陽の赤い光が直接当たるから','地球の影が赤いから'], answer:1, exp:'地球大気を通った太陽光は青い波長が散乱され、赤い波長だけが月に届く（夕焼けと同じ原理）。これで月が赤く見える！' },

  // ----- g5_force -----
  { id:83, unit:'g5_force', level:'easy',   q:'てこが「つりあう」条件は？', choices:['左右の重さが同じ','左右の（力×距離）が等しい','支点が真ん中にある','腕の長さが同じ'], answer:1, exp:'てこのつりあいの原理：左の力×距離＝右の力×距離。支点からの距離が大事！' },
  { id:84, unit:'g5_force', level:'easy',   q:'動滑車を1つ使うと、力はどうなる？', choices:['力が2倍必要','力が半分で済む（ひもを引く距離は2倍）','力も距離も変わらない','力も距離も半分になる'], answer:1, exp:'動滑車は力を半分にできる代わりに、引く距離が2倍必要。仕事の量（力×距離）は変わらない！' },
  { id:85, unit:'g5_force', level:'easy',   q:'水中の物体に働く浮力はどのように決まる？', choices:['物体の重さで決まる','物体が押しのけた液体の重さで決まる','物体の大きさで決まる','液体の温度で決まる'], answer:1, exp:'浮力＝物体が押しのけた液体の体積×液体の密度×重力加速度。水なら1cm³につき約0.01Nだよ！' },
  { id:86, unit:'g5_force', level:'easy',   q:'速さの単位「m/s（メートル毎秒）」の意味は？', choices:['1秒間に進むメートル数','1分間に進むメートル数','1時間に進むメートル数','1メートル進むのにかかる秒数'], answer:0, exp:'m/sは「1秒あたりに進む距離（メートル）」を表す速さの単位。速さ＝距離÷時間で求められるよ！' },
  { id:87, unit:'g5_force', level:'easy',   q:'仕事の量（J:ジュール）の計算式は？', choices:['仕事＝力（N）＋距離（m）','仕事＝力（N）×距離（m）','仕事＝力（N）÷距離（m）','仕事＝力（N）×時間（s）'], answer:1, exp:'仕事（J）＝力（N）×距離（m）。10Nの力で2m動かすと20Jの仕事。方向が大切で、直角方向の力は仕事をしない！' },
  { id:88, unit:'g5_force', level:'normal', q:'てこの「力点・支点・作用点」の位置関係で、最も小さい力で重いものを持ち上げられる配置は？', choices:['支点を力点に近づける','力点を支点に近づける・作用点を支点から遠ざける','支点を作用点と力点の中間に置く','力点と作用点を同じ位置にする'], answer:0, exp:'力点を支点から遠ざける（力点と支点の距離大）ほど小さい力でOK！作用点は支点に近いほど有利だよ。' },
  { id:89, unit:'g5_force', level:'normal', q:'密度が水（1g/cm³）より小さい物体を水に入れると？', choices:['沈む','浮く','水の表面にだけ留まる','密度と浮き沈みは関係ない'], answer:1, exp:'密度が水より小さい（軽い）ものは水に浮く。木・氷（0.9g/cm³）は浮く。鉄（7.87g/cm³）は沈む！' },
  { id:90, unit:'g5_force', level:'normal', q:'斜面を使ってものを持ち上げるとき、仕事の量は？', choices:['斜面なしより大きくなる','斜面なしより小さくなる','斜面なしと同じ','斜面の角度による'], answer:2, exp:'仕事の原理：道具（斜面・滑車・てこ）を使っても仕事の総量は変わらない。力が小さくなる分、距離が長くなるよ！' },
  { id:91, unit:'g5_force', level:'normal', q:'「慣性」とは何か？', choices:['物体が磁力を持つ性質','物体が運動状態を保ち続けようとする性質','物体が熱を持つ性質','物体が電気を帯びる性質'], answer:1, exp:'慣性：動いている物体は動き続け、静止している物体は静止し続けようとする性質。急ブレーキで体が前に傾くのがそれ！' },
  { id:92, unit:'g5_force', level:'hard',   q:'支点から左に30cm・重さ200gのおもりと、右に50cmの場所につりあわせるには何gのおもりが必要？', choices:['100g','120g','150g','200g'], answer:1, exp:'左：200×30＝6000。右：□×50＝6000。□＝120g。てこのつりあいは（力×距離）が等しくなるよ！' },
  { id:93, unit:'g5_force', level:'hard',   q:'100cm³の物体を水に完全に沈めたとき、水から受ける浮力は何N？（水の密度1g/cm³）', choices:['0.1N','0.5N','1N','10N'], answer:2, exp:'浮力＝押しのけた水の重さ＝100cm³×1g/cm³＝100g＝1N。この計算パターンを覚えよう！' },
  { id:94, unit:'g5_force', level:'hard',   q:'仕事の原理で「動滑車1つを使って10kgの荷物を2m持ち上げる仕事量」は？', choices:['50J','100J','196J','392J'], answer:2, exp:'仕事量＝力×距離。10kg→約100N。動滑車で力は50Nで済むが距離が4m必要。50N×4m＝200J≒100N×2m＝200J（約196J）' },

  // ----- g5_electricity -----
  { id:95, unit:'g5_electricity', level:'easy',   q:'オームの法則の式はどれ？', choices:['V=I+R','V=I×R','V=I÷R','I=V×R'], answer:1, exp:'V（電圧）＝I（電流）×R（抵抗）がオームの法則！変形するとI＝V÷R、R＝V÷Iも使いこなそう！' },
  { id:96, unit:'g5_electricity', level:'easy',   q:'直列回路では電流はどうなる？', choices:['分かれる','どこも同じ','場所によって違う','合計される'], answer:1, exp:'直列回路は電流の通り道が1本だから、どこでも同じ電流が流れる。電圧は各抵抗に分かれて加わるよ！' },
  { id:97, unit:'g5_electricity', level:'easy',   q:'磁石のN極とN極を近づけると？', choices:['引き合う','反発する','どちらでもない','くっつく'], answer:1, exp:'同じ極（N-N、S-S）は反発し合い、異なる極（N-S）は引き合う。磁石の基本！' },
  { id:98, unit:'g5_electricity', level:'easy',   q:'電磁誘導で電流を発生させるには？', choices:['電池を近づける','磁石をコイルの近くで動かす','コイルに光を当てる','コイルを温める'], answer:1, exp:'磁石をコイルの中で動かすと電流が発生する（電磁誘導）。これが発電機・自転車のライトの原理！' },
  { id:99, unit:'g5_electricity', level:'easy',   q:'電圧（V）の単位「ボルト」が表すのは？', choices:['電流の強さ','電気を流そうとする勢い（圧力）','抵抗の大きさ','電力の大きさ'], answer:1, exp:'電圧は電気を流そうとする「勢い」や「圧力」。高い電圧ほど強い電流が流れやすくなるよ！' },
  { id:100, unit:'g5_electricity', level:'normal', q:'10Ωの抵抗に5Vの電圧をかけると流れる電流は？', choices:['0.2A','0.5A','2A','50A'], answer:1, exp:'I＝V÷R＝5÷10＝0.5A。オームの法則の計算！単位（A・V・Ω）の関係を整理して使おう！' },
  { id:101, unit:'g5_electricity', level:'normal', q:'並列回路で10Ωと20Ωの抵抗をつなぐと合成抵抗は？', choices:['30Ω','5Ω','6.67Ω','15Ω'], answer:2, exp:'並列の合成抵抗：1/R＝1/10＋1/20＝3/20。R≈6.67Ω。並列は合成抵抗が各抵抗より小さくなるよ！' },
  { id:102, unit:'g5_electricity', level:'normal', q:'フレミングの左手の法則で親指が示すのは？', choices:['磁界の向き','電流の向き','力（運動）の向き','電圧の向き'], answer:2, exp:'フレミング左手：中指が電流・人差し指が磁界・親指が力の向き。モーターの動く方向を求めるのに使うよ！' },
  { id:103, unit:'g5_electricity', level:'normal', q:'家庭用コンセントの電気が交流である特徴は？', choices:['電流の向きが一定','電流の向きが周期的に変わる','電圧が0V固定','電流が流れない'], answer:1, exp:'交流（AC）は電流の向きが周期的に変わる（日本は50Hzまたは60Hz）。直流（DC）は向きが一定（電池）。' },
  { id:104, unit:'g5_electricity', level:'hard',   q:'直列に20Ωと30Ωの抵抗をつなぎ10Vの電池をつないだとき20Ωにかかる電圧は？', choices:['2V','3V','4V','6V'], answer:2, exp:'合成抵抗50Ω。電流I＝10/50＝0.2A。20Ωにかかる電圧＝0.2×20＝4V。直列では電圧が抵抗比で分かれる！' },
  { id:105, unit:'g5_electricity', level:'hard',   q:'電力（W）の計算式は？', choices:['P＝V×I','P＝V÷I','P＝V＋I','P＝I²÷R'], answer:0, exp:'電力（W）＝電圧（V）×電流（A）。100Wの電球は100V×1A＝100W。電力×時間＝電力量（Wh）！' },
  { id:106, unit:'g5_electricity', level:'hard',   q:'コイルの巻き数を2倍・磁石の強さを2倍にしたとき、電磁誘導の電流はどうなる？', choices:['2倍','4倍','変わらない','8倍'], answer:1, exp:'巻き数2倍×磁石強さ2倍＝4倍の電流。各要因が掛け算で効くので、両方2倍なら4倍になる！' },

  // ----- g6_chemistry -----
  { id:107, unit:'g6_chemistry', level:'easy',   q:'燃焼が起きる3つの条件はどれ？', choices:['酸素・光・熱','燃えるもの・酸素・発火点以上の温度','水・酸素・燃えるもの','燃えるもの・二酸化炭素・高温'], answer:1, exp:'燃焼の3条件：①燃えるもの（可燃物）②酸素 ③発火点以上の温度。1つでも欠けると燃えない！' },
  { id:108, unit:'g6_chemistry', level:'easy',   q:'BTB溶液が黄色を示す水溶液の性質は？', choices:['中性','アルカリ性','酸性','無性'], answer:2, exp:'BTB溶液：酸性→黄色、中性→緑色、アルカリ性→青色。リトマス紙と合わせて覚えよう！' },
  { id:109, unit:'g6_chemistry', level:'easy',   q:'塩酸（HCl）と水酸化ナトリウム（NaOH）が中和すると何ができる？', choices:['酢酸と水','塩化ナトリウム（食塩）と水','炭酸ガスと水','酸素と水'], answer:1, exp:'塩酸＋水酸化ナトリウム→塩化ナトリウム（食塩）＋水。中和：酸＋アルカリ→塩＋水の代表例！' },
  { id:110, unit:'g6_chemistry', level:'easy',   q:'鉄がさびるとき、酸素と結合する反応を何という？', choices:['還元','蒸発','酸化','溶解'], answer:2, exp:'鉄がさびる・ものが燃えるのはどちらも酸化（酸素と結合する反応）。燃焼は急速な酸化だよ！' },
  { id:111, unit:'g6_chemistry', level:'easy',   q:'フェノールフタレイン溶液が赤くなる水溶液の性質は？', choices:['酸性','中性','アルカリ性','どんな水溶液でも'], answer:2, exp:'フェノールフタレイン：アルカリ性のみ赤（ピンク）色に変わる。酸性・中性では無色のまま！' },
  { id:112, unit:'g6_chemistry', level:'normal', q:'酸化銅を水素で加熱して銅に戻す反応を何という？', choices:['酸化','中和','還元','電離'], answer:2, exp:'酸化銅＋水素→銅＋水。酸化物から酸素を奪う反応が「還元」。酸化と還元は必ず同時に起きる（酸化還元反応）！' },
  { id:113, unit:'g6_chemistry', level:'normal', q:'中和反応で「ちょうど中和した点」を何という？', choices:['中和点','飽和点','沸点','平衡点'], answer:0, exp:'中和点（当量点）：酸とアルカリがちょうど打ち消しあった点。BTBで緑色になるのが中性（pH7）！' },
  { id:114, unit:'g6_chemistry', level:'normal', q:'ものが燃えた後、重さはどうなる？（密閉容器中での燃焼）', choices:['減る','増える','変わらない','なくなる'], answer:2, exp:'密閉容器では燃焼で発生したCO₂・H₂Oも全部残るので質量は変わらない（質量保存の法則）！' },
  { id:115, unit:'g6_chemistry', level:'normal', q:'水溶液の酸性の強さを表す指標のpHで、pH3とpH6ではどちらが強い酸性？', choices:['pH6の方が強い酸性','pH3の方が強い酸性','同じ強さ','pHは酸性の強さを表さない'], answer:1, exp:'pHは数値が小さいほど強い酸性・大きいほど強いアルカリ性。pH7が中性。pH3は強酸性！' },
  { id:116, unit:'g6_chemistry', level:'hard',   q:'マグネシウムを空気中で燃焼させると質量はどうなる？', choices:['減る（酸素が奪われるから）','変わらない','増える（酸素と結合するから）','なくなる'], answer:2, exp:'Mg＋O₂→MgO。マグネシウムが酸素と結合して酸化マグネシウムになるので質量が増える！質量保存の法則より。' },
  { id:117, unit:'g6_chemistry', level:'hard',   q:'100mLの塩酸を完全に中和するのに水酸化ナトリウム水溶液60mLが必要だった。この塩酸150mLを中和するには何mL必要？', choices:['60mL','90mL','120mL','150mL'], answer:1, exp:'100mL→60mLだから比は100:60＝5:3。150mLには150×(3/5)＝90mL必要。中和の比例計算が頻出！' },
  { id:118, unit:'g6_chemistry', level:'hard',   q:'炭素（C）を完全燃焼させたとき生成する物質は？', choices:['CO（一酸化炭素）','CO₂（二酸化炭素）','C₂O₃','水（H₂O）'], answer:1, exp:'Cが完全燃焼：C＋O₂→CO₂。不完全燃焼だとCOが出る。入試では「完全燃焼」かどうか確認しよう！' },

  // ----- g6_mechanics -----
  { id:119, unit:'g6_mechanics', level:'easy',   q:'水中の物体に働く浮力は何で決まる？', choices:['物体の重さ','物体の材質','水中に入っている体積','水の温度'], answer:2, exp:'浮力＝押しのけた水の重さ＝水中の体積×水の密度。完全に沈めば浮力は最大（同じ体積の水の重さ）！' },
  { id:120, unit:'g6_mechanics', level:'easy',   q:'てこの計算で「支点から左に20cm・100gのおもり」とつりあわせるために「支点から右に40cmに置くおもり」は何g？', choices:['200g','100g','50g','25g'], answer:2, exp:'左：100×20＝2000。右：□×40＝2000。□＝50g。力×距離が等しくなるのがてこのつりあい！' },
  { id:121, unit:'g6_mechanics', level:'easy',   q:'「仕事の原理」とは何か？', choices:['力が大きいほど仕事が楽になる','道具を使っても仕事量は変わらない','滑車を使うと必ず速くなる','道具を使うと仕事量が減る'], answer:1, exp:'仕事の原理：道具（滑車・斜面・てこ）を使っても仕事の総量は変わらない。力×距離が一定！' },
  { id:122, unit:'g6_mechanics', level:'easy',   q:'位置エネルギーが最大になるのはいつ？', choices:['最も速く動いているとき','最も高い位置にあるとき','地面に触れたとき','止まっているとき'], answer:1, exp:'位置エネルギー＝mgh（高さに比例）。ブランコの一番高いところで最大、一番低いところで最小（運動エネルギー最大）！' },
  { id:123, unit:'g6_mechanics', level:'easy',   q:'密度2g/cm³・体積50cm³の物体を水に入れたとき、沈む？浮く？', choices:['浮く（密度が水より大きいから）','沈む（密度が水より大きいから）','半分だけ沈む','底に激しく沈む'], answer:1, exp:'密度2g/cm³＞水の密度1g/cm³なので沈む。密度が水より大きいものは沈み、小さいものは浮くよ！' },
  { id:124, unit:'g6_mechanics', level:'normal', q:'動滑車2つと定滑車1つを組み合わせ200Nの荷物を持ち上げるとき必要な力は？', choices:['200N','100N','50N','25N'], answer:2, exp:'動滑車1つで力が1/2に。動滑車2つで力が1/4に→200×1/4＝50N。ひもを引く距離は4倍必要だよ！' },
  { id:125, unit:'g6_mechanics', level:'normal', q:'水の密度1g/cm³・物体の体積100cm³・物体の質量150g。この物体を水に入れたとき、水面から出る体積は何cm³？', choices:['全部沈む','100cm³（全部出る）','50cm³','約33cm³'], answer:3, exp:'物体の密度＝150/100＝1.5g/cm³＞1g/cm³なので全部沈む。浮く場合は（物体の質量/水の密度）cm³が沈む。' },
  { id:126, unit:'g6_mechanics', level:'normal', q:'なめらかな斜面（長さ10m・高さ2m）を使って100Nの荷物を上げるとき必要な力は？', choices:['100N','50N','20N','10N'], answer:2, exp:'仕事量一定：100N×2m＝200J。斜面：F×10m＝200J → F＝20N。斜面の長さが長いほど力が小さくなる！' },
  { id:127, unit:'g6_mechanics', level:'normal', q:'空気中での重さ5N、水中での重さ3Nの物体。浮力は何N？', choices:['8N','3N','5N','2N'], answer:3, exp:'浮力＝空気中の重さ−水中の重さ＝5−3＝2N。これが基本の浮力の求め方！水中の重さを「みかけの重さ」という。' },
  { id:128, unit:'g6_mechanics', level:'hard',   q:'鉄製の船が水に浮くのはなぜ？', choices:['鉄の密度が水より小さいから','中が空洞で全体の密度が水より小さいから','海水の浮力が特に大きいから','鉄と水が反応して浮く力が生まれるから'], answer:1, exp:'鉄の密度は約7.87g/cm³で水より大きい。でも船は空洞があり、全体の平均密度を水より小さくすることで浮く！' },
  { id:129, unit:'g6_mechanics', level:'hard',   q:'長さ1mの棒の重心（重さが均等の棒）の左端から20cmに支点を置く。左端に100gのおもりをつるすとき、反対側のつりあいに必要な条件は？', choices:['右端（100cm）に30g','右端（100cm）に25g','右から40cmの場所に50g','左から70cmの場所に50g'], answer:0, exp:'支点（左端から20cm）：左腕20cm、右腕80cm。棒自体の重さ（重心は50cm）も考える。左：100×20＝2000 → 右端：x×80…計算は棒の重さを含め複雑。ここは原理理解が大切！' },
  { id:130, unit:'g6_mechanics', level:'hard',   q:'単振り子の周期に影響するのはどれ？', choices:['おもりの重さ','振れ幅（小さい場合）','ひもの長さ','空気の温度'], answer:2, exp:'振り子の周期はひもの長さだけで決まる（重さや振れ幅には関係しない）。T＝2π√(L/g)がその式！' },

  // ----- g6_stars -----
  { id:131, unit:'g6_stars', level:'easy',   q:'太陽系の惑星の順番（太陽から）で正しいのは？', choices:['水・金・火・地・木・土・天・海','水・金・地・火・木・土・天・海','地・火・木・土・水・金・天・海','水・地・金・火・土・木・天・海'], answer:1, exp:'水星・金星・地球・火星・木星・土星・天王星・海王星。「水金地火木土天海」で覚えよう！' },
  { id:132, unit:'g6_stars', level:'easy',   q:'自ら光を出す天体を何という？', choices:['惑星','衛星','恒星','彗星'], answer:2, exp:'恒星は核融合反応でエネルギーを出して自ら光る（太陽・シリウスなど）。惑星・衛星は自ら光らない！' },
  { id:133, unit:'g6_stars', level:'easy',   q:'夏の代表的な星座「さそり座」の明るい赤い星の名前は？', choices:['デネブ','ベガ','アルタイル','アンタレス'], answer:3, exp:'アンタレスはさそり座のα星（最も明るい星）。赤くて大きな星（赤色超巨星）。夏の南の空に見えるよ！' },
  { id:134, unit:'g6_stars', level:'easy',   q:'太陽系で環（リング）を持つ惑星として最も有名なのは？', choices:['木星','火星','土星','海王星'], answer:2, exp:'土星は美しい環を持つ惑星として有名。環は主に氷と岩石の破片でできているよ！' },
  { id:135, unit:'g6_stars', level:'easy',   q:'北の空の星は何を中心に動いて見える？', choices:['月','太陽','北極星','オリオン座'], answer:2, exp:'北極星は地球の自転軸の延長線上にあり、ほぼ動かない。他の北の星は北極星を中心に反時計回りに回る！' },
  { id:136, unit:'g6_stars', level:'normal', q:'天の川銀河で太陽系はどこにある？', choices:['銀河の中心','銀河の端の方（腕の一部）','別の銀河','銀河の外側'], answer:1, exp:'太陽系は天の川銀河（直径約10万光年）の中心から約2.6万光年離れた渦巻き腕の一部にあるよ！' },
  { id:137, unit:'g6_stars', level:'normal', q:'星が東の空から西の空へ1日に動いて見える（日周運動）の原因は？', choices:['星自体が移動しているから','地球が自転しているから','地球が公転しているから','月の引力のため'], answer:1, exp:'地球の自転（西から東へ）のため、星は東→南→西に動いて見える。これを「日周運動」という！' },
  { id:138, unit:'g6_stars', level:'normal', q:'冬の大三角を構成する星はどれ？', choices:['ベガ・アルタイル・デネブ','シリウス・ベテルギウス・プロキオン','アンタレス・スピカ・アルクトゥルス','シリウス・リゲル・プロキオン'], answer:1, exp:'冬の大三角：シリウス（おおいぬ座）・ベテルギウス（オリオン座）・プロキオン（こいぬ座）！' },
  { id:139, unit:'g6_stars', level:'normal', q:'星の年周運動（1年かけての移動）の原因は？', choices:['地球の自転','地球の公転','月の公転','太陽の自転'], answer:1, exp:'地球が公転することで、夜に見える星座が1ヶ月で約30°西へずれる（年周運動）。季節ごとに星座が変わる理由！' },
  { id:140, unit:'g6_stars', level:'hard',   q:'太陽の中心で起きているエネルギー源は？', choices:['核分裂（ウランの分裂）','核融合（水素→ヘリウム）','燃焼（酸素と水素の反応）','化学反応'], answer:1, exp:'太陽では水素原子核4つがヘリウム原子核1つに融合する核融合反応でエネルギーが生まれる。質量が少し減る！' },
  { id:141, unit:'g6_stars', level:'hard',   q:'1光年とはどのくらいの距離か？', choices:['光が1秒に進む距離（約30万km）','光が1年間に進む距離（約9.5兆km）','地球から太陽までの距離（約1.5億km）','地球の直径（約1.3万km）'], answer:1, exp:'1光年＝光が1年間に進む距離＝約9.5兆km。最も近い恒星（ケンタウルスα星）でも約4.2光年離れているよ！' },
  { id:142, unit:'g6_stars', level:'hard',   q:'「地球が丸い」ことを示す証拠として最も古典的なものは？', choices:['衛星写真で確認した','船が遠ざかるとき船体から消えていく（地球の曲率）','月食で地球の影が丸い','宇宙に出た宇宙飛行士が見た'], answer:2, exp:'月食のとき地球の影が丸く見える・船が地平線の向こうへ消えるとき船体から順に消える、などが古典的証拠！' },

  // ----- g6_weather -----
  { id:143, unit:'g6_weather', level:'easy',   q:'低気圧では空気はどのように流れ込む？', choices:['中心から外へ（時計回り）','外から中心へ（反時計回り）・上昇気流','外から中心へ（時計回り）','中心から外へ（反時計回り）'], answer:1, exp:'低気圧：周囲から中心へ反時計回りに流れ込み、中心で上昇気流→雲・雨。これが低気圧と雨の関係！' },
  { id:144, unit:'g6_weather', level:'easy',   q:'寒冷前線の通過後の天気の変化は？', choices:['暖かくなり長雨が続く','急激に温度が下がり晴れてくることが多い','変化がない','霧が続く'], answer:1, exp:'寒冷前線通過後：急な気温低下・北西風・晴れ（気圧上昇）。通過時は短時間の激しい雨・雷雨！' },
  { id:145, unit:'g6_weather', level:'easy',   q:'台風が最も発生しやすい時期はいつ？', choices:['3〜5月（春）','6〜7月（梅雨）','8〜9月（夏〜初秋）','12〜2月（冬）'], answer:2, exp:'台風は熱帯・亜熱帯の海面温度が高い夏に発生しやすく、8〜9月に日本への影響が最も多いよ！' },
  { id:146, unit:'g6_weather', level:'easy',   q:'日本の気候に大きな影響を与える「偏西風」の方向は？', choices:['南から北へ','北から南へ','西から東へ','東から西へ'], answer:2, exp:'偏西風は西から東へ吹く上空の強い風。日本の天気が「西から東へ変化する」最大の原因！' },
  { id:147, unit:'g6_weather', level:'easy',   q:'梅雨（つゆ）の原因となる前線を何という？', choices:['寒冷前線','温暖前線','停滞前線（梅雨前線）','閉塞前線'], answer:2, exp:'梅雨は停滞前線（梅雨前線）が日本付近に停滞することで起きる。オホーツク海高気圧と太平洋高気圧の境界！' },
  { id:148, unit:'g6_weather', level:'normal', q:'冬に北西の季節風が日本海側に雪を降らせる理由は？', choices:['日本海が冷たいから','大陸から来た冷たく乾いた空気が日本海で水蒸気を補充するから','北西風が直接雪を運ぶから','日本海側の標高が高いから'], answer:1, exp:'シベリアからの冷たく乾いた風が暖流（対馬海流）の日本海を通ると大量の水蒸気を吸って山脈にぶつかり雪を降らせる！' },
  { id:149, unit:'g6_weather', level:'normal', q:'閉塞前線（へいそくぜんせん）とは？', choices:['雨をあまり降らさない前線','寒冷前線が温暖前線に追いついたときにできる前線','山脈にぶつかった前線','海上でのみできる前線'], answer:1, exp:'温帯低気圧が発達すると速い寒冷前線が温暖前線に追いついて閉塞前線を形成。低気圧が衰弱し始めるサイン！' },
  { id:150, unit:'g6_weather', level:'normal', q:'フェーン現象とは何か？', choices:['海から湿った風が吹いて雨が降る現象','山を越えた風が乾いて温かくなる現象','冬に北から冷たい風が吹く現象','低気圧に吹き込む風の現象'], answer:1, exp:'フェーン現象：湿った空気が山を越えるとき雨を降らせ、反対側で乾いた高温の風になる。日本海側→関東などで起きる！' },
  { id:151, unit:'g6_weather', level:'hard',   q:'高気圧と低気圧が交互に通過するとき、天気の変化の周期はおよそ何日？', choices:['1〜2日','3〜7日','15日','30日'], answer:1, exp:'温帯低気圧と高気圧が交互に通過する春・秋は天気が約3〜7日周期で変化（周期的な天気変化）！' },
  { id:152, unit:'g6_weather', level:'hard',   q:'気象衛星ひまわりで観測できない情報はどれ？', choices:['雲の分布','台風の位置と強さ','大気の流れ（可視画像）','海底の地形'], answer:3, exp:'気象衛星は大気・雲・地表面の情報は観測できるが、海底（地形や水温の下の情報）は観測できない！' },

  // ----- g4_electricity2 -----
  { id:200, unit:'g4_electricity2', level:'easy',   q:'電熱線（ニクロム線）に電流を流すと何が発生する？', choices:['光だけ','熱だけ','熱と光','磁力'], answer:1, exp:'電熱線は電気エネルギーを熱に変える素子。電気ストーブやトースターに使われているよ！' },
  { id:201, unit:'g4_electricity2', level:'easy',   q:'豆電球とLEDを比べたとき、省エネなのはどちら？', choices:['豆電球','LED','どちらも同じ','場合による'], answer:1, exp:'LEDは豆電球より少ない電力で同じ明るさを出せる省エネな光源。寿命も長いよ！' },
  { id:202, unit:'g4_electricity2', level:'easy',   q:'電磁石の強さを強くする方法はどれ？', choices:['コイルの巻き数を減らす','電流を小さくする','コイルの巻き数を増やすか電流を大きくする','鉄しんを外す'], answer:2, exp:'電磁石は①巻き数を増やす②電流を大きくする③鉄しんを入れるで強くなるよ！' },
  { id:203, unit:'g4_electricity2', level:'easy',   q:'電磁石が永久磁石と違う点は？', choices:['引きつける力が弱い','電流を切ると磁力がなくなる','鉄しか引きつけない','水の中では使えない'], answer:1, exp:'電磁石は電流を流したときだけ磁力が生じる。電流のオン・オフで磁力を制御できるのが最大の特徴！' },
  { id:204, unit:'g4_electricity2', level:'easy',   q:'乾電池2本を並列つなぎにすると電球の明るさはどうなる？', choices:['2倍明るくなる','暗くなる','変わらないが長持ちする','消える'], answer:2, exp:'並列つなぎは電圧は1本と同じなので明るさは変わらない。でも電池が長持ちするよ！' },
  { id:205, unit:'g4_electricity2', level:'normal', q:'電流の大きさを測る器具と、つなぎ方の正しい組み合わせは？', choices:['電流計・並列につなぐ','電流計・直列につなぐ','電圧計・直列につなぐ','テスター・並列につなぐ'], answer:1, exp:'電流計は回路に直列につなぐ。並列につなぐと内部抵抗が低いので回路がショートしてしまうよ！' },
  { id:206, unit:'g4_electricity2', level:'normal', q:'電熱線の発熱量を大きくする方法として正しいのは？', choices:['電流を小さくする','電熱線を長くする','電流を大きくするか電圧を高くする','電熱線を並列につなぐ'], answer:2, exp:'発熱量は電力（電圧×電流）に比例する。電流や電圧を大きくするほど発熱量が増えるよ！' },
  { id:207, unit:'g4_electricity2', level:'normal', q:'コイルと磁石を使って電気を作る仕組みは？', choices:['電気分解','電磁誘導','静電気','光電効果'], answer:1, exp:'磁石をコイルに近づけたり遠ざけたりすると電流が生じる。これが電磁誘導で発電機の原理！' },
  { id:208, unit:'g4_electricity2', level:'hard',   q:'電気回路で抵抗を直列に2つつなぐと、全体の抵抗はどうなる？', choices:['半分になる','変わらない','2倍になる（それぞれの和）','4倍になる'], answer:2, exp:'直列接続の全抵抗＝各抵抗の合計。2つを直列にすれば全抵抗は2倍になり、電流が流れにくくなるよ！' },
  { id:209, unit:'g4_electricity2', level:'hard',   q:'電力の計算式として正しいのは？', choices:['電力＝電圧÷電流','電力＝電流÷電圧','電力＝電圧×電流','電力＝電圧＋電流'], answer:2, exp:'電力（W）＝電圧（V）×電流（A）。100Vの家電に1A流れると消費電力100Wだよ！' },
  { id:210, unit:'g4_electricity2', level:'hard',   q:'光電池（太陽電池）はどのようなエネルギー変換をするか？', choices:['熱エネルギー→電気エネルギー','光エネルギー→電気エネルギー','化学エネルギー→電気エネルギー','運動エネルギー→電気エネルギー'], answer:1, exp:'光電池（太陽電池）は光エネルギーを直接電気エネルギーに変換する。太陽光発電の基本原理！' },
  { id:211, unit:'g4_electricity2', level:'hard',   q:'電磁石のN極とS極を逆にする方法は？', choices:['電流を大きくする','コイルの巻き数を増やす','電流の向きを逆にする','鉄しんを外す'], answer:2, exp:'電磁石の極は電流の向きで決まる。電流を逆にするとN極とS極が入れ替わるよ！' },

  // ----- g4_seasons -----
  { id:212, unit:'g4_seasons', level:'easy',   q:'冬眠する動物として正しいのはどれ？', choices:['スズメ','クマ','サメ','カラス'], answer:1, exp:'クマ・カエル・ヘビ・コウモリなどが冬眠する。体温を下げてエネルギーを節約して冬を越すよ！' },
  { id:213, unit:'g4_seasons', level:'easy',   q:'春になると日本にやってきて夏を過ごし秋に南へ帰る渡り鳥は？', choices:['ハクチョウ','マガモ','ツバメ','ツル'], answer:2, exp:'ツバメは春に東南アジアから渡ってきて夏を過ごし、秋に南へ帰る。ハクチョウは冬に来るよ！' },
  { id:214, unit:'g4_seasons', level:'easy',   q:'サクラは落葉樹か常緑樹か？', choices:['常緑樹','落葉樹','どちらでもない','季節によって変わる'], answer:1, exp:'サクラは秋に葉が落ちる落葉樹。スギ・マツは年中葉がある常緑樹。冬の葉の有無で区別できるよ！' },
  { id:215, unit:'g4_seasons', level:'easy',   q:'カエルの幼生（おたまじゃくし）から成体になるときの変化は？', choices:['えら呼吸から肺呼吸へ変わる','肺呼吸からえら呼吸へ変わる','変化しない','水の中でのみ生きられる'], answer:0, exp:'おたまじゃくしはえら呼吸→成体のカエルは肺と皮膚呼吸。変態によって陸上生活できるようになるよ！' },
  { id:216, unit:'g4_seasons', level:'easy',   q:'秋に紅葉する理由は？', choices:['葉が凍るから','気温が下がり葉緑素が分解されて赤や黄の色素が現れるから','虫が食べるから','雨が少ないから'], answer:1, exp:'気温低下と日照時間の短縮で葉緑素が壊れて赤（アントシアニン）や黄（カロテノイド）が見えてくるよ！' },
  { id:217, unit:'g4_seasons', level:'normal', q:'種子で冬を越す植物の特徴は？', choices:['常緑樹が多い','一年草に多く、種子は低温に強い','多年草のみが種子で越冬する','球根で越冬する'], answer:1, exp:'アサガオ・ヒマワリなどの一年草は種子で越冬。種子は乾燥・低温に耐えられるよ！球根は別の越冬方法！' },
  { id:218, unit:'g4_seasons', level:'normal', q:'ナナホシテントウが冬を越す方法は？', choices:['南へ渡る','成虫のまま落ち葉の下や土の中で越冬する','卵で越冬する','木の中に入る'], answer:1, exp:'テントウムシは成虫のまま集団で落ち葉の下や木の根元で越冬する。春になると活動を再開するよ！' },
  { id:219, unit:'g4_seasons', level:'normal', q:'秋に実をつける植物として正しいのはどれ？', choices:['アブラナ（菜の花）','チューリップ','ドングリ（コナラなど）','タンポポ（春）'], answer:2, exp:'ドングリは秋に実るコナラなどの実（種子）。リス・クマなどの動物にとって大切な食料になるよ！' },
  { id:220, unit:'g4_seasons', level:'hard',   q:'気候変動による季節の生物への影響として最も正確なものはどれ？', choices:['温暖化で冬眠期間が長くなる','桜の開花が早まるなど、生物の季節行動が変化している','渡り鳥の数が増えている','昆虫の種類が減少している（冬が寒くなるため）'], answer:1, exp:'地球温暖化で気温が上昇し、桜の開花が早まる・渡り鳥の渡来時期がずれるなど生物の季節行動が変化している！' },
  { id:221, unit:'g4_seasons', level:'hard',   q:'光周性（こうしゅうせい）とは何か？', choices:['植物が光に向かって曲がる現象','日の長さ（光周期）に反応して花芽をつくるなど季節的変化をする性質','光合成の速さが光の強さに比例すること','動物が光に集まる性質'], answer:1, exp:'光周性：昼の長さ（日長）の変化を感知して花を咲かせたり冬眠に入ったりする性質。アサガオは短日植物の典型例！' },
  { id:222, unit:'g4_seasons', level:'hard',   q:'北半球で夏至（6月21日頃）に昼が最も長い理由は？', choices:['地球が太陽に最も近いから','地球の地軸が傾いているため北半球が太陽の方向に傾くから','太陽が最も大きく見えるから','大気の透明度が高いから'], answer:1, exp:'地軸が23.4度傾いているため夏至は北半球が太陽側に傾き、日照時間が最大になる。冬至はその逆！' },

  // ----- g4_matter -----
  { id:223, unit:'g4_matter', level:'easy',   q:'粘土の形を変えても重さはどうなる？', choices:['重くなる','軽くなる','変わらない','形によって変わる'], answer:2, exp:'物質の量が変わらなければ形を変えても重さは変わらない。これは質量保存の原理！' },
  { id:224, unit:'g4_matter', level:'easy',   q:'食塩を水に溶かしたとき、重さはどうなる？', choices:['食塩の重さが消える','食塩と水の合計の重さと同じになる','水だけの重さになる','重さは2倍になる'], answer:1, exp:'食塩は水に溶けて見えなくなるが、なくなったわけではない。食塩＋水の重さ＝食溶液の重さ！' },
  { id:225, unit:'g4_matter', level:'easy',   q:'同じ重さの鉄と木綿（わた）を比べると体積はどうちがう？', choices:['鉄の方が体積が大きい','木綿の方が体積が大きい','同じ体積','材質は体積に関係ない'], answer:1, exp:'密度が低い木綿は鉄と同じ重さでも体積がはるかに大きい。密度＝質量÷体積 を覚えよう！' },
  { id:226, unit:'g4_matter', level:'easy',   q:'水に溶かせる量に限界がある。この限界量を何という？', choices:['溶解度','濃度','飽和度','融点'], answer:0, exp:'溶解度：一定量の水に溶かすことができる物質の最大量。食塩やミョウバンにも溶解度があるよ！' },
  { id:227, unit:'g4_matter', level:'easy',   q:'ろ過（ろか）で分けられるものとして正しいのは？', choices:['食塩水と水','砂と水','食塩と砂（ろ過だけでは不十分）','アルコールと水'], answer:1, exp:'ろ過はろ紙の穴より大きい粒を除く操作。砂は分けられるが食塩（溶けている）はろ紙を通ってしまうよ！' },
  { id:228, unit:'g4_matter', level:'normal', q:'水温を上げるとミョウバンの溶解度はどう変わる？', choices:['変わらない','大きく下がる','大きく上がる','下がった後上がる'], answer:2, exp:'ミョウバンは水温が上がると溶解度が大きく増える（温度依存性が高い）。食塩はほとんど変わらないのと対照的！' },
  { id:229, unit:'g4_matter', level:'normal', q:'溶けているものを取り出す方法として最適なのは？', choices:['ろ過','蒸発（加熱）','冷却結晶化・蒸発','攪拌（かき混ぜ）'], answer:2, exp:'蒸発や冷却で再結晶として取り出せる。食塩は蒸発法、ミョウバンは冷却結晶化が有効！' },
  { id:230, unit:'g4_matter', level:'normal', q:'物体を水に沈めると浮力がはたらく。浮力の大きさは何で決まる？', choices:['物体の重さ','物体の材質','物体が押しのけた水の体積','物体の表面積'], answer:2, exp:'アルキメデスの原理：浮力＝押しのけた液体の重さ（体積×密度×重力加速度）。体積が大きいほど浮力が大きい！' },
  { id:231, unit:'g4_matter', level:'hard',   q:'密度が水（1g/cm³）より小さいものは水に浮く。氷の密度は約0.9g/cm³。これが意味することは？', choices:['氷は水に沈む','氷は水に浮く（約10%が水面上に出る）','氷は水と同じ密度','温度によって変わる'], answer:1, exp:'氷の密度0.9g/cm³<水の密度1g/cm³なので氷は水に浮く。体積の約10%が水面より上に出て残りが水中に沈む！' },
  { id:232, unit:'g4_matter', level:'hard',   q:'食塩水の濃度が3%とはどういう意味か？', choices:['食塩3g＋水100g＝103gの溶液','食塩3g＋水97g＝100gの溶液','水100gに食塩を3g溶かした溶液','水3gに食塩97gを溶かした溶液'], answer:1, exp:'濃度3%＝（溶質÷溶液）×100。100gの溶液に3gの食塩が溶けている。食塩3g＋水97g＝100g！' },
  { id:233, unit:'g4_matter', level:'hard',   q:'二酸化炭素を水に溶かすと何ができる？', choices:['食塩水','炭酸水（弱酸性）','アルカリ性の水','純水'], answer:1, exp:'CO₂が水に溶けると炭酸（H₂CO₃）が生成され炭酸水（弱酸性）になる。炭酸飲料のシュワシュワの正体！' },

  // ----- g4_river -----
  { id:234, unit:'g4_river', level:'easy',   q:'川の上流の特徴として正しいのはどれ？', choices:['流れが遅く川幅が広い','流れが速く川幅が狭い','砂や泥が多く堆積する','平野が広がる'], answer:1, exp:'上流：流れが速い・川幅が狭い・V字谷・大きな岩が多い。下流に行くほど流れが遅く川幅が広くなるよ！' },
  { id:235, unit:'g4_river', level:'easy',   q:'川の水が岸や川底を削るはたらきを何という？', choices:['堆積','運搬','侵食','風化'], answer:2, exp:'侵食（しんしょく）：流れる水が岸や川底を削るはたらき。上流ほど侵食が強くV字谷が形成されるよ！' },
  { id:236, unit:'g4_river', level:'easy',   q:'川が運んだ土砂が下流や河口に積もるはたらきを何という？', choices:['侵食','運搬','堆積','溶解'], answer:2, exp:'堆積（たいせき）：流れが遅くなると土砂が積もるはたらき。河口の三角州や扇状地もこのはたらきでできる！' },
  { id:237, unit:'g4_river', level:'easy',   q:'河口付近に土砂が積もってできる三角形の地形を何という？', choices:['扇状地','三角州（デルタ）','氾濫原','カルデラ'], answer:1, exp:'三角州（デルタ）：川が海に流れ込む河口付近に砂・泥が堆積してできる三角形の地形。ナイル川などが有名！' },
  { id:238, unit:'g4_river', level:'easy',   q:'大雨のあと川の水が増える理由は？', choices:['地下水が蒸発するから','山や地面に降った雨が川に流れ込むから','海水が逆流するから','川底から水が湧き出るから'], answer:1, exp:'降った雨は地面に染み込んだり、地表を流れて川に集まる。大雨では地面に吸収しきれない水が一気に川へ！' },
  { id:239, unit:'g4_river', level:'normal', q:'山から平野に出た扇状地に見られる地形の特徴は？', choices:['三角形で河口付近にある','扇形で山地と平野の境目にある','円形で湖の底にある','V字形で山の中にある'], answer:1, exp:'扇状地：山地から流れ出た川が傾斜が緩くなる平野に出るとき土砂が扇形に広がって堆積した地形！' },
  { id:240, unit:'g4_river', level:'normal', q:'川の曲がっている部分で、流れが速いのはどちら側？', choices:['内側（カーブの内側）','外側（カーブの外側）','両方同じ','底の方が速い'], answer:1, exp:'カーブの外側は遠心力で流れが速く侵食が強い（崖ができやすい）。内側は流れが遅く堆積が起きやすい！' },
  { id:241, unit:'g4_river', level:'normal', q:'川の氾濫を防ぐために人間が作る構造物として正しいのは？', choices:['ダム・堤防・遊水地','橋・トンネル・港','温泉施設・釣り場','農業用水路のみ'], answer:0, exp:'ダム（貯水）・堤防（川岸の壁）・遊水地（増水時に水を逃がす場所）などが洪水対策の主な構造物！' },
  { id:242, unit:'g4_river', level:'hard',   q:'侵食・運搬・堆積の3つの作用を正しく順序立てて説明したものは？', choices:['堆積→運搬→侵食','侵食→運搬→堆積（上流から下流へ）','運搬→侵食→堆積','すべて同時に起きる'], answer:1, exp:'上流で岩を削る（侵食）→土砂を運ぶ（運搬）→流れが遅くなる下流で積もる（堆積）の順が基本！' },
  { id:243, unit:'g4_river', level:'hard',   q:'グランドキャニオンのような谷はどのようにしてできた？', choices:['火山の噴火','地殻変動で隆起した大地を川が長年侵食した','氷河が削った','隕石の落下'], answer:1, exp:'グランドキャニオンはコロラド川が数百万年かけて岩盤を侵食してできた峡谷。侵食の長期的効果の好例！' },
  { id:244, unit:'g4_river', level:'hard',   q:'流速と土砂の粒の大きさの関係で正しいのは？', choices:['流速が速いほど小さな粒が積もる','流速が速いほど大きな粒を運べる','流速と粒の大きさは無関係','流速が遅いほど大きな粒が動く'], answer:1, exp:'流速が大きいほど大きな粒（礫や砂）を運べる。流速が落ちると大きな粒から順に堆積し細かい粒は遠くまで運ばれる！' },

  // ----- g4_spring -----
  { id:245, unit:'g4_spring', level:'easy',   q:'ばねに力を加えると伸びた。力を2倍にすると伸びはどうなる？', choices:['変わらない','2倍になる（フックの法則）','4倍になる','半分になる'], answer:1, exp:'フックの法則：ばねの伸びは加えた力に比例する。力が2倍なら伸びも2倍！弾性の範囲内での話だよ！' },
  { id:246, unit:'g4_spring', level:'easy',   q:'ばねばかりで測るものは何か？', choices:['質量（g）','長さ（cm）','力の大きさ（N）','温度（℃）'], answer:2, exp:'ばねばかりはばねの伸びを利用して力の大きさ（ニュートン：N）を測る道具。重力の大きさを測れるよ！' },
  { id:247, unit:'g4_spring', level:'easy',   q:'ばねを自然長より伸ばすと、元に戻ろうとする力が生じる。この力を何という？', choices:['重力','摩擦力','弾性力（復元力）','浮力'], answer:2, exp:'弾性力（弾性の力）：変形したばねが元の形に戻ろうとする力。ゴム・スプリングも同じ性質を持つ！' },
  { id:248, unit:'g4_spring', level:'easy',   q:'ばね2本を直列につないで同じ力を加えると伸びはどうなる？', choices:['半分になる','変わらない','2倍になる','4倍になる'], answer:2, exp:'直列つなぎ（縦につなぐ）は各ばねが同じ力を受けて伸びるので、合計の伸びは2倍になる！' },
  { id:249, unit:'g4_spring', level:'easy',   q:'ばね2本を並列につないで同じおもりをつるすと伸びはどうなる？', choices:['2倍になる','変わらない','半分になる','4倍になる'], answer:2, exp:'並列つなぎ（横に並べる）は2本で力を分担するので各ばねにかかる力は半分になり、伸びも半分！' },
  { id:250, unit:'g4_spring', level:'normal', q:'10gのおもりでばねが2cm伸びた。30gのおもりをつるすと何cm伸びる？', choices:['2cm','4cm','6cm','10cm'], answer:2, exp:'フックの法則より伸びは力に比例。30g÷10g＝3倍だから伸びも3倍。2cm×3＝6cm！' },
  { id:251, unit:'g4_spring', level:'normal', q:'ばねに加える力が弾性限界を超えるとどうなる？', choices:['伸びが比例のまま増える','元に戻らなくなる（塑性変形）','急に縮む','切れる前に力が0になる'], answer:1, exp:'弾性限界を超えると元に戻らなくなる（塑性変形）。この範囲内がフックの法則の適用範囲！' },
  { id:252, unit:'g4_spring', level:'normal', q:'重さ150gの物体を持ち上げるのに必要な力は約何N？（100gを1Nとする）', choices:['1N','1.5N','15N','150N'], answer:1, exp:'100gの物体にはたらく重力≒1N。150gなら1.5N。（正確には質量×重力加速度9.8m/s²だが、小学校では100g＝1N）' },
  { id:253, unit:'g4_spring', level:'hard',   q:'フックの法則が成り立たなくなる条件は？', choices:['ばねを水中に入れたとき','気温が下がったとき','弾性限界を超えた力を加えたとき','ゆっくり力を加えたとき'], answer:2, exp:'弾性限界（比例限界）を超えた力を加えると、伸びが力に比例しなくなりフックの法則が成り立たなくなる！' },
  { id:254, unit:'g4_spring', level:'hard',   q:'ばね定数とは何か？', choices:['ばねの重さ','単位力あたりのばねの伸びの大きさ（N/m）','ばねの長さ','ばねの直径'], answer:1, exp:'ばね定数k：1Nの力でばねが何m伸びるかを表す定数。k＝F/x（F：力、x：伸び）。硬いばねほどkが大きい！' },
  { id:255, unit:'g4_spring', level:'hard',   q:'ばねを使ったはかりを宇宙（無重力）で使うと重さを正確に測れる？', choices:['測れる（重力と関係ない）','測れない（重力がないので力がはたらかない）','質量だけなら測れる','ばねの種類によって異なる'], answer:1, exp:'ばねばかりは重力（N）を測る。宇宙の無重力では物体にはたらく重力がほぼ0なので、ばねが伸びず測れない！質量は天びんで測るよ。' },

  // ----- g5_animals -----
  { id:256, unit:'g5_animals', level:'easy',   q:'メダカの卵はどこに産みつけられる？', choices:['川底の石の下','水草などに産みつけられる','水面に浮く','親のお腹の中'], answer:1, exp:'メダカのメスは受精卵を水草などに産みつける。卵は1〜2週間で孵化するよ！' },
  { id:257, unit:'g5_animals', level:'easy',   q:'人の赤ちゃんは母親のお腹の中でどこで育つ？', choices:['胃','肺','子宮','肝臓'], answer:2, exp:'受精卵は子宮の内壁に着床し、約38週（約10ヶ月）かけて成長して誕生する！' },
  { id:258, unit:'g5_animals', level:'easy',   q:'魚の卵（メダカなど）と人の赤ちゃんの育ち方の大きな違いは？', choices:['魚は体内・人は体外で育つ','魚は体外で卵として育ち・人は体内で育つ','どちらも体内で育つ','どちらも卵で育つ'], answer:1, exp:'魚は体外（卵）で育つ卵生、人は体内（子宮）で育つ胎生。胎生は母体から栄養をもらいながら育つ！' },
  { id:259, unit:'g5_animals', level:'easy',   q:'胎児が母体から酸素や栄養をもらうための器官は？', choices:['へそ','胎盤','羊水','へその緒だけ'], answer:1, exp:'胎盤：母体と胎児をつなぐ器官。胎盤でガス・栄養交換を行い、へその緒を通して胎児に届けられる！' },
  { id:260, unit:'g5_animals', level:'easy',   q:'メダカのオスとメスの見分け方で正しいのは？', choices:['体の色で判断','背びれの切れ込みと尻びれの形が異なる','大きさで判断','ひれの数で判断'], answer:1, exp:'オス：背びれに切れ込みあり・尻びれが大きい平行四辺形。メス：背びれに切れ込みなし・尻びれが小さい三角形！' },
  { id:261, unit:'g5_animals', level:'normal', q:'受精卵が胚として細胞分裂を繰り返す過程を何という？', choices:['変態','発生','光合成','消化'], answer:1, exp:'受精卵が分裂し胚→胎芽→胎児と成長する一連のプロセスを「発生」という。脊椎動物はみな同じ過程をたどる！' },
  { id:262, unit:'g5_animals', level:'normal', q:'哺乳類の特徴として正しいものはどれか？', choices:['卵で産まれ変温動物','体毛あり・恒温動物・胎生（一部卵生）・子に乳を与える','えら呼吸をする','鱗がある'], answer:1, exp:'哺乳類：体毛あり・恒温動物・胎生（カモノハシなど一部は卵生）・乳腺で子育て・肺呼吸！' },
  { id:263, unit:'g5_animals', level:'normal', q:'羊水（ようすい）の役割は？', choices:['栄養を運ぶ','胎児を衝撃や乾燥から守る','酸素を供給する','老廃物を運び出す'], answer:1, exp:'羊水は胎児を取り囲む液体。外部の衝撃・温度変化・乾燥から保護し、胎児が動けるスペースを作る！' },
  { id:264, unit:'g5_animals', level:'hard',   q:'受精（じゅせい）とは何か？', choices:['卵が水中に放出されること','卵子と精子が結合して受精卵になること','受精卵が子宮に着床すること','精子が卵子に近づくこと'], answer:1, exp:'受精：精子と卵子が合体して1つの受精卵（接合子）ができること。1個の精子しか入れない！遺伝情報が合わさるよ！' },
  { id:265, unit:'g5_animals', level:'hard',   q:'体外受精と体内受精の違いを正しく説明したものは？', choices:['体外受精は魚に多く水中で受精・体内受精は哺乳類に多く親の体内で受精','体外受精は哺乳類・体内受精は魚','どちらも同じ','受精場所は関係ない'], answer:0, exp:'体外受精（魚・カエルなど）：卵と精子を体外の水中で合わせる。体内受精（哺乳類・鳥など）：体内で精子と卵子が合体！' },
  { id:266, unit:'g5_animals', level:'hard',   q:'メダカの卵が孵化するまでの日数に最も影響する環境要因は？', choices:['水の深さ','水温（温かいほど早い）','餌の量','光の強さ'], answer:1, exp:'メダカは水温25℃で約10日・水温20℃で約2週間で孵化。温度が高いほど発生が速くなるよ！' },

  // ----- g5_body -----
  { id:267, unit:'g5_body', level:'easy',   q:'人の体の骨格の役割として正しいものはどれか？', choices:['血液をつくる・体を支える・内臓を守る','消化をする','呼吸をする','体温を調節する'], answer:0, exp:'骨格の3大役割：①体を支える（支持）②内臓・脳を守る（保護）③骨髄で血液をつくる（造血）！' },
  { id:268, unit:'g5_body', level:'easy',   q:'筋肉が縮む（収縮する）ことで骨が動く。筋肉と骨のつなぎ目は？', choices:['靭帯（じんたい）','腱（けん）','軟骨','神経'], answer:1, exp:'腱（けん）：筋肉を骨に結びつけるかたい繊維組織。アキレス腱が有名。靭帯は骨と骨をつなぐよ！' },
  { id:269, unit:'g5_body', level:'easy',   q:'全身の筋肉を意識的に動かせる筋肉を何という？', choices:['平滑筋','心筋','骨格筋（横紋筋）','内臓筋'], answer:2, exp:'骨格筋（横紋筋）は自分の意志で動かせる随意筋。心筋（心臓）や平滑筋（内臓）は無意識に動く不随意筋！' },
  { id:270, unit:'g5_body', level:'easy',   q:'関節はどこにあるか？', choices:['筋肉の中','骨と骨がつながる部分','皮膚の下','血管の中'], answer:1, exp:'関節は骨と骨が接合する部位。曲げ伸ばしや回転などの動きができるよ。ひじ・ひざ・肩などが代表例！' },
  { id:271, unit:'g5_body', level:'easy',   q:'体を動かすとき、曲げる筋肉と伸ばす筋肉は同時に収縮する？', choices:['同時に収縮する','交互に働く（一方が縮むと他方が伸びる）','伸ばす筋肉だけ働く','曲げる筋肉だけ働く'], answer:1, exp:'拮抗筋（きっこうきん）の関係：ひじを曲げるとき上腕二頭筋が縮み三頭筋が伸びる。常に一対で協調して動く！' },
  { id:272, unit:'g5_body', level:'normal', q:'人体の骨格を大きく分けると何個くらいの骨があるか？', choices:['約30個','約100個','約206個','約500個'], answer:2, exp:'成人の骨格は約206個の骨で構成されている。赤ちゃんは約300個あるが成長とともに癒合して減るよ！' },
  { id:273, unit:'g5_body', level:'normal', q:'骨の中心（骨髄）ではたらく細胞でつくられるものは？', choices:['消化酵素','血液細胞（赤血球・白血球・血小板）','ホルモン','神経繊維'], answer:1, exp:'骨髄では赤血球（酸素運搬）・白血球（免疫）・血小板（止血）など血液細胞が作られる（造血）！' },
  { id:274, unit:'g5_body', level:'normal', q:'体を動かすときに使われるエネルギー源として最も直接的なものは？', choices:['タンパク質','水','ATP（アデノシン三リン酸）','ビタミン'], answer:2, exp:'筋肉はATP（エネルギーの通貨）を消費して収縮する。ATPはブドウ糖や脂肪を分解して作られるよ！' },
  { id:275, unit:'g5_body', level:'hard',   q:'骨折が治るとき、骨を修復する細胞は何か？', choices:['白血球','骨芽細胞（こつがさいぼう）','赤血球','筋細胞'], answer:1, exp:'骨芽細胞（造骨細胞）が新たな骨を形成し骨折部位を修復する。骨は破骨細胞が壊し骨芽細胞が作るバランスで維持されているよ！' },
  { id:276, unit:'g5_body', level:'hard',   q:'神経系において、脳からの命令を筋肉に伝える神経は？', choices:['感覚神経','運動神経','自律神経','末梢神経全般'], answer:1, exp:'運動神経は脳・脊髄（中枢）からの指令を筋肉（末梢）に伝える遠心性神経。感覚神経は感覚情報を脳に伝える求心性神経！' },
  { id:277, unit:'g5_body', level:'hard',   q:'レントゲン（X線）写真で骨が白く見える理由は？', choices:['骨が光を反射するから','骨に含まれるカルシウムがX線を吸収するから','骨が白色だから','X線を骨が発するから'], answer:1, exp:'骨に含まれるカルシウム（Ca）やリン（P）が高原子番号元素でX線を多く吸収するため、フィルムに白く写る！軟部組織はX線を通過させ黒く写る。' },

  // ----- g5_earth -----
  { id:278, unit:'g5_earth', level:'easy',   q:'地層が水平に積み重なっているとき、下の層と上の層ではどちらが古いか？', choices:['上の層','下の層','同じ時期','傾きで異なる'], answer:1, exp:'地層の重なりの法則：地層は下から上へ順番に積もるので、下の層ほど古い。これが地質学の基本！' },
  { id:279, unit:'g5_earth', level:'easy',   q:'火山が噴火したときに降り積もる火山灰でできた地層は？', choices:['砂岩層','泥岩層','凝灰岩層（ぎょうかいがんそう）','石灰岩層'], answer:2, exp:'凝灰岩層：火山噴火の火山灰が堆積してできた地層。広い地域で同時期に積もるため地層の年代の目印になる！' },
  { id:280, unit:'g5_earth', level:'easy',   q:'地層に含まれる化石から何がわかるか？', choices:['地層が堆積した年代と当時の環境','地層の厚さだけ','地下水の量','岩石の硬さ'], answer:0, exp:'示準化石（年代を特定）・示相化石（環境を復元）の2種類。アンモナイトは古生代の示準化石！' },
  { id:281, unit:'g5_earth', level:'easy',   q:'地面を掘って露出した地層の断面を何という？', choices:['断層','露頭（ろとう）','褶曲','カルデラ'], answer:1, exp:'露頭（がけや道路工事などで地層が自然または人工的に露出した場所）で地層を観察できるよ！' },
  { id:282, unit:'g5_earth', level:'easy',   q:'地震で地層がずれてできた面を何という？', choices:['褶曲','断層','不整合','節理'], answer:1, exp:'断層：地震などで地層や岩石が力を受けてずれた面。活断層は現在も動く可能性がある断層！' },
  { id:283, unit:'g5_earth', level:'normal', q:'不整合（ふせいごう）とは何か？', choices:['地層が水平に連続すること','地層の堆積が一時中断した証拠（上下の地層が平行でない）','断層が2本交差すること','地層が曲がること'], answer:1, exp:'不整合：地層の堆積が中断（侵食など）した後に新たな地層が積もった境界面。時間のギャップを示す！' },
  { id:284, unit:'g5_earth', level:'normal', q:'化石になりやすい生物の特徴は？', choices:['軟らかい体を持つ生物','硬い殻・骨・歯を持つ生物','動きが速い生物','小さな生物'], answer:1, exp:'貝・サンゴ・骨・歯など硬い部分は腐敗しにくく堆積物に埋もれて化石になりやすい。軟体部はほぼ残らない！' },
  { id:285, unit:'g5_earth', level:'normal', q:'三葉虫（さんようちゅう）が示準化石になれる理由は？', choices:['現在も生きているから','古生代に広く分布し現在は絶滅しているから','とても大きいから','日本だけに生息していたから'], answer:1, exp:'示準化石の条件：①特定の地質時代だけに生息②広い地域に分布③個体数が多い。三葉虫は古生代の示準化石！' },
  { id:286, unit:'g5_earth', level:'hard',   q:'地層の「傾斜不整合」が示すものは？', choices:['地層が水平に続いていること','下の地層が傾いて侵食された後に上の地層が水平に積もったこと','地震で地層がずれたこと','火山噴火があったこと'], answer:1, exp:'傾斜不整合：古い地層が地殻変動で傾き→隆起と侵食→再び海底に沈んで新しい地層が水平に積もった証拠！' },
  { id:287, unit:'g5_earth', level:'hard',   q:'放射性年代測定（ほうしゃせいねんだいそくてい）とは？', choices:['化石の形から年代を推定する方法','岩石中の放射性同位体の割合から絶対年代を求める方法','地層の重なりから相対年代を求める方法','磁気を使って年代を測る方法'], answer:1, exp:'放射性同位体（C-14など）は一定の速度で崩壊する。崩壊率を測ることで数万〜数十億年前まで年代を特定できる！' },
  { id:288, unit:'g5_earth', level:'hard',   q:'プレートが収束（ぶつかる）すると、大陸側に何ができやすいか？', choices:['裂け目（海嶺）','山脈・海溝・火山','三角州','扇状地'], answer:1, exp:'海洋プレートが大陸プレートに沈み込む収束型境界では、海溝・火山・山脈（褶曲山脈）が形成される！アンデス山脈が例！' },

  // ----- g5_light -----
  { id:289, unit:'g5_light', level:'easy',   q:'光がまっすぐ進む性質を何という？', choices:['屈折','反射','直進','散乱'], answer:2, exp:'光の直進：光は均一な物質の中では直線的に進む。影ができるのもこの性質のおかげ！' },
  { id:290, unit:'g5_light', level:'easy',   q:'鏡に当たった光が跳ね返る現象を何という？', choices:['屈折','反射','吸収','散乱'], answer:1, exp:'光の反射：入射角＝反射角（反射の法則）。鏡・水面などで光が跳ね返る現象！' },
  { id:291, unit:'g5_light', level:'easy',   q:'光が空気から水（ガラス）に入るとき起きる現象は？', choices:['反射','吸収','屈折','直進'], answer:2, exp:'光の屈折：光が異なる物質の境界で速さが変わり進む方向が曲がること。空気→水では法線に近づく方向に曲がる！' },
  { id:292, unit:'g5_light', level:'easy',   q:'凸レンズに太陽光を当てると光が集まる点を何という？', choices:['焦点（しょうてん）','光源','屈折点','像'], answer:0, exp:'焦点：凸レンズが平行光線を集める点。レンズの中心から焦点までの距離を焦点距離という！' },
  { id:293, unit:'g5_light', level:'easy',   q:'太陽光をプリズムに通すと何色に分かれる？', choices:['赤・黄・青の3色','赤・橙・黄・緑・青・藍・紫（7色）','白と黒','赤と青のみ'], answer:1, exp:'プリズムや虹で見られる光のスペクトル。白色光は赤橙黄緑青藍紫の連続した色に分解される！' },
  { id:294, unit:'g5_light', level:'normal', q:'凸レンズで物体が焦点より外にあるとき、実像はどこにできる？', choices:['レンズの前方','レンズの後方','レンズ上','像はできない'], answer:1, exp:'物体が焦点より遠い位置：レンズ後方に実像（上下左右逆の像）が生じる。カメラのフィルムに映る像の原理！' },
  { id:295, unit:'g5_light', level:'normal', q:'凸レンズで物体が焦点より内側にあるとき何が見える？', choices:['実像が逆さまに見える','虚像（正立で大きく見える）が見える','何も見えない','光が集まるだけ'], answer:1, exp:'物体が焦点の内側：虚像（虚の像）が正立・拡大されて見える。虫眼鏡で物を大きく見るときの原理！' },
  { id:296, unit:'g5_light', level:'normal', q:'光の色と波長の関係で正しいのは？', choices:['赤が最も波長が短く紫が最も長い','紫が最も波長が短く赤が最も長い','すべての色の波長は同じ','波長と色は無関係'], answer:1, exp:'可視光線の波長：紫（約380nm）が最短、赤（約700nm）が最長。プリズムで屈折率の違いにより分離される！' },
  { id:297, unit:'g5_light', level:'hard',   q:'全反射（ぜんはんしゃ）とは何か？', choices:['鏡で光が100%反射すること','光が密な媒質から疎な媒質に入射角が臨界角を超えたとき屈折せずすべて反射する現象','光が散乱すること','レンズで焦点に集まること'], answer:1, exp:'全反射：水やガラスから空気へ出る光の入射角が臨界角を超えると光は屈折せず100%反射する。光ファイバーの原理！' },
  { id:298, unit:'g5_light', level:'hard',   q:'ピンホールカメラで像が上下左右逆になる理由は？', choices:['レンズが像を逆にするから','小さな穴を通る光が交差するから','光が反射するから','空気が像を歪めるから'], answer:1, exp:'ピンホール（針穴）を通る光は直進するため、上から来た光は下に、右から来た光は左に交差して像が上下左右逆になる！' },
  { id:299, unit:'g5_light', level:'hard',   q:'光の速さはおよそ何か？', choices:['340m/s（音速）','3万km/s','30万km/s','3億m/s（30万km/s と同じ）'], answer:3, exp:'光速は約30万km/s（3×10⁸m/s）。音速（約340m/s）の約88万倍！光は1秒で地球を7周半できるよ！' },

  // ----- g5_solution -----
  { id:300, unit:'g5_solution', level:'easy',   q:'食塩を水に溶かした液体を何という？', choices:['混合物','食塩水（水溶液）','懸濁液','コロイド'], answer:1, exp:'水溶液：物質が水に均一に溶けた液体。透明で時間がたっても沈殿しないのが特徴！食塩水はその代表例！' },
  { id:301, unit:'g5_solution', level:'easy',   q:'水溶液を蒸発させると食塩が出てくる。食塩は水に溶けたとき消えた？', choices:['消えた（なくなった）','消えていない（見えなくなっただけ）','変質した','別の物質になった'], answer:1, exp:'食塩は水に溶けても無くなったわけではない。溶けたまま均一に広がっているだけで、蒸発させると取り出せる！' },
  { id:302, unit:'g5_solution', level:'easy',   q:'水溶液の性質を調べるのに使うものはどれか？', choices:['ヨウ素液','リトマス試験紙・BTB溶液','顕微鏡','スポイト'], answer:1, exp:'リトマス試験紙（酸性→赤、アルカリ性→青）やBTB溶液（酸性→黄、中性→緑、アルカリ性→青）で水溶液の性質がわかる！' },
  { id:303, unit:'g5_solution', level:'easy',   q:'水100gに食塩が溶ける量には限界がある。この最大量を何という？', choices:['濃度','溶解度','飽和度','粒子数'], answer:1, exp:'溶解度：一定温度の水100gに溶ける溶質の最大量（g）。食塩は約35℃までほぼ変わらず約36g溶けるよ！' },
  { id:304, unit:'g5_solution', level:'easy',   q:'炭酸水（炭酸飲料）は何性か？', choices:['酸性','中性','アルカリ性','変化する'], answer:0, exp:'炭酸水はCO₂が水に溶けて炭酸（H₂CO₃）が生じた弱酸性の溶液。リトマス紙を赤くするよ！' },
  { id:305, unit:'g5_solution', level:'normal', q:'ミョウバンの飽和水溶液を高温から冷やすと何が起きる？', choices:['何も変わらない','ミョウバンの結晶が析出する','ミョウバンがさらに溶ける','水が蒸発する'], answer:1, exp:'ミョウバンは温度依存性が高く、高温では大量に溶けるが冷えると溶解度が急減し結晶が析出（再結晶）する！' },
  { id:306, unit:'g5_solution', level:'normal', q:'食塩水から食塩を取り出すのに最適な方法は？', choices:['ろ過','冷却結晶化','蒸発（加熱）','磁石で引きつける'], answer:2, exp:'食塩は温度による溶解度変化が小さいため冷却では取り出しにくい。加熱蒸発させると食塩を取り出せる！' },
  { id:307, unit:'g5_solution', level:'normal', q:'水溶液が均一な混合物といえる理由は？', choices:['濃さが場所によって異なるから','どこをとっても同じ濃さ（均一）だから','粒子が見えるから','時間がたつと分離するから'], answer:1, exp:'水溶液は溶質が分子・イオンレベルで均一に分散しているため、どこをとっても同じ濃さ。光を当てても散乱しない！' },
  { id:308, unit:'g5_solution', level:'hard',   q:'質量パーセント濃度20%の食塩水200gに含まれる食塩の質量は？', choices:['20g','40g','10g','100g'], answer:1, exp:'食塩の質量＝溶液の質量×濃度÷100＝200g×20÷100＝40g。溶液全体200gの20%が食塩だよ！' },
  { id:309, unit:'g5_solution', level:'hard',   q:'溶解度曲線で、ある温度での溶解度が50g/水100gのとき、飽和水溶液の濃度は何%か？', choices:['50%','33%','25%','10%'], answer:1, exp:'溶液150g（水100g＋溶質50g）に溶質50g→濃度＝50÷150×100≒33%。溶液の質量は水＋溶質の合計！' },
  { id:310, unit:'g5_solution', level:'hard',   q:'コロイド溶液（コロイド）の特徴として正しいのは？', choices:['水溶液と同じで透明','光を当てると光路が見えるチンダル現象が起きる','沈殿する','ろ紙を通らない粒子のみからなる'], answer:1, exp:'コロイド：粒子径1〜1000nmの分散系。光を当てると光が散乱して光路が見える（チンダル現象）。牛乳・ゼリーが例！' },

  // ----- g5_sound -----
  { id:311, unit:'g5_sound', level:'easy',   q:'音は何が振動することで伝わるか？', choices:['光','空気などの媒質が振動することで伝わる','磁場','電流'], answer:1, exp:'音は弾性波（縦波）で、空気・水・固体などの媒質が振動することで伝わる。真空中では音は伝わらない！' },
  { id:312, unit:'g5_sound', level:'easy',   q:'音の高低は何によって決まるか？', choices:['振幅（音の大きさ）','振動数（周波数）','音速','媒質の種類'], answer:1, exp:'音の高さ＝振動数（Hz：1秒間の振動数）。振動数が多い（高い）ほど高い音。ドレミは振動数の違い！' },
  { id:313, unit:'g5_sound', level:'easy',   q:'音の大小は何によって決まるか？', choices:['振動数（周波数）','波長','振幅（音の大きさ）','音速'], answer:2, exp:'音の大きさ＝振幅（振動の幅）。振幅が大きいほど大きな音になる。単位はdB（デシベル）！' },
  { id:314, unit:'g5_sound', level:'easy',   q:'音が空気中を伝わる速さは約何m/sか？', choices:['340m/s','3400m/s','34m/s','3m/s'], answer:0, exp:'音速（空気中・15℃）は約340m/s。水中では約1500m/s、固体（鉄）ではさらに速い5000m/s以上！' },
  { id:315, unit:'g5_sound', level:'easy',   q:'真空の宇宙空間では音は伝わるか？', choices:['伝わる','伝わらない','遅くなる','逆向きに伝わる'], answer:1, exp:'音は媒質（物質）の振動で伝わるため、媒質がない真空では伝わらない！宇宙では爆発音も聞こえないよ。' },
  { id:316, unit:'g5_sound', level:'normal', q:'弦楽器で高い音を出す方法はどれか？', choices:['弦を長くする','弦を細くするか短くするか強く張る','弦をゆるめる','弦を厚くする'], answer:1, exp:'高い音：①弦を短くする②弦を細くする③弦を強く張る（張力を上げる）。逆にすると低い音になる！' },
  { id:317, unit:'g5_sound', level:'normal', q:'救急車のサイレンが近づくとき音が高く、遠ざかると低く聞こえる現象を何という？', choices:['共鳴','うなり（ビート）','ドップラー効果','反響（エコー）'], answer:2, exp:'ドップラー効果：音源や観測者が動くとき、観測される音の高さ（周波数）が変化する現象！' },
  { id:318, unit:'g5_sound', level:'normal', q:'音が壁に当たって戻ってくる現象を何という？', choices:['屈折','反射（やまびこ・エコー）','干渉','吸収'], answer:1, exp:'反射（反響・エコー）：音が硬い壁や山に当たって跳ね返る現象。やまびこはこれが原因！' },
  { id:319, unit:'g5_sound', level:'hard',   q:'雷が光ってから10秒後に音が聞こえた。雷までの距離は約何kmか？（音速340m/s）', choices:['340m','3.4km','34km','0.34km'], answer:1, exp:'距離＝速さ×時間＝340m/s×10s＝3400m＝3.4km。光は瞬時（30万km/s）に届くので音の遅延で距離がわかる！' },
  { id:320, unit:'g5_sound', level:'hard',   q:'超音波（ちょうおんぱ）の特徴として正しいのは？', choices:['人間に聞こえる音と同じ','人間に聞こえない高周波数の音波で医療・探知に使われる','音速より速い','水中では伝わらない'], answer:1, exp:'超音波：20kHz以上の人間に聞こえない高い周波数の音波。医療（エコー）・魚群探知機・コウモリのエコロケーションに利用！' },
  { id:321, unit:'g5_sound', level:'hard',   q:'共鳴（きょうめい）とはどのような現象か？', choices:['音が壁で反射すること','同じ固有振動数を持つ物体が他の振動に反応して振動を始めること','音が空気を暖めること','音が屈折すること'], answer:1, exp:'共鳴（共振）：ある物体の固有振動数と外部の振動の振動数が一致したとき、大きく振動する現象。ワイングラスの共鳴が有名！' },

  // ----- g5_water -----
  { id:322, unit:'g5_water', level:'easy',   q:'水が蒸発して水蒸気になり、冷えて雲（水滴・氷晶）になり、雨として降る一連の循環を何という？', choices:['光合成','水の循環（水循環）','食物連鎖','大気循環'], answer:1, exp:'水循環：太陽エネルギーを源として海・川・地下水・植物などから蒸発→雲形成→降水→流下のサイクル！' },
  { id:323, unit:'g5_water', level:'easy',   q:'雲はどのようにしてできるか？', choices:['煙が集まってできる','水蒸気を含む空気が上昇して冷やされ、水滴や氷晶になって浮かぶ','地面から水が蒸発するだけでできる','星が集まってできる'], answer:1, exp:'上昇した空気が断熱冷却されて露点以下になると水蒸気が水滴・氷晶となり雲になる。山を越えた空気も雲を作る！' },
  { id:324, unit:'g5_water', level:'easy',   q:'川の水が最終的に流れ込む場所は？', choices:['地下水になる','蒸発してなくなる','海に流れ込む（一部は地下水や湖に）','大気中に出る'], answer:2, exp:'川の水はほとんどが海に流れ込む。一部は途中で蒸発したり地下水になったりするが、最終的に海へ帰る！' },
  { id:325, unit:'g5_water', level:'easy',   q:'植物が根から吸い上げた水を葉の気孔から水蒸気として出すはたらきを何という？', choices:['光合成','呼吸','蒸散','吸水'], answer:2, exp:'蒸散：植物の葉の気孔から水蒸気が蒸発するはたらき。水の引っ張り上げる力（毛細管現象＋蒸散圧）を生む！' },
  { id:326, unit:'g5_water', level:'easy',   q:'雨水が地面にしみ込んで岩盤の上に溜まったものを何という？', choices:['地表水','雲','地下水','海水'], answer:2, exp:'地下水：雨水が土や岩の隙間にしみ込んで貯留した水。井戸水・湧き水・温泉などとして利用されるよ！' },
  { id:327, unit:'g5_water', level:'normal', q:'水が水蒸気になる（気化する）のに必要なエネルギーを何という？', choices:['融解熱','気化熱（蒸発熱）','凝縮熱','昇華熱'], answer:1, exp:'気化熱（蒸発熱）：液体が気体になるときに吸収する熱。汗が蒸発して体を冷やすのも気化熱を奪うから！' },
  { id:328, unit:'g5_water', level:'normal', q:'海水が蒸発するとき塩分はどうなるか？', choices:['塩分も一緒に蒸発する','塩分は残り、水蒸気だけ蒸発する','塩分が増える','塩分が溶けて消える'], answer:1, exp:'蒸発するのは水分子（H₂O）だけ。塩分（NaClイオン）は残る。だから雨は淡水（真水）として降るよ！' },
  { id:329, unit:'g5_water', level:'normal', q:'水の状態変化のうち、液体→固体（氷）になる変化を何という？', choices:['融解','蒸発','凝固','昇華'], answer:2, exp:'凝固：液体が固体になる状態変化。水は0℃以下で凝固して氷になる。逆（固体→液体）は融解！' },
  { id:330, unit:'g5_water', level:'hard',   q:'水の異常性：水（H₂O）は他の似た化合物より沸点が高い理由は？', choices:['分子量が大きいから','水素結合があるため分子間の引力が強い','重力の影響','水が最も安定な化合物だから'], answer:1, exp:'水分子間の水素結合（H…O）は分子間力を強め、沸点100℃と予測値より大幅に高い。この異常性が生命を支えている！' },
  { id:331, unit:'g5_water', level:'hard',   q:'地球上の水のうち、人が直接利用できる淡水は全体の何%程度か？', choices:['約97%','約70%','約2.5%（そのほとんどは氷河）','約0.01%'], answer:2, exp:'地球の水の約97%は海水（塩水）。淡水は約2.5%で、そのほとんどは氷河・地下水。すぐ使える地表水は約0.01%！' },
  { id:332, unit:'g5_water', level:'hard',   q:'温室効果ガスとして水蒸気が重要な役割を持つ理由は？', choices:['水蒸気は光を吸収するから','水蒸気は地球から放出される赤外線を吸収して大気を温める','水蒸気は雲になるだけ','水蒸気はCO₂より効果が小さい'], answer:1, exp:'水蒸気（H₂O）はCO₂より温室効果が大きい最重要温室効果ガス。地表から放出される赤外線を吸収し大気を温める！' },

  // ----- g6_electricity -----
  { id:333, unit:'g6_electricity', level:'easy',   q:'電磁誘導で電流を発生させるにはどうすればよいか？', choices:['コイルの中の磁界を変化させる','電池をつなぐ','コイルを水につける','電球をつなぐ'], answer:0, exp:'電磁誘導：コイルの中の磁界が変化すると電圧が生じ電流が流れる。磁石をコイルに近づけたり遠ざけるのが典型例！' },
  { id:334, unit:'g6_electricity', level:'easy',   q:'発電機が発生させる電流の種類は？', choices:['直流（DC）','交流（AC）','どちらでもない','光電流'], answer:1, exp:'発電機は磁石の回転により方向が周期的に変わる交流（AC）を発生する。家庭のコンセントも交流！' },
  { id:335, unit:'g6_electricity', level:'easy',   q:'日本の家庭用コンセントの電圧は？', choices:['12V','100V','200V','240V'], answer:1, exp:'日本の家庭用電圧は100V（50Hzまたは60Hz）。欧米は200〜240Vが多い。電気機器を海外で使うときは変圧器が必要！' },
  { id:336, unit:'g6_electricity', level:'easy',   q:'電力（W）を求める式はどれか？', choices:['電力＝電圧＋電流','電力＝電圧×電流','電力＝電流÷電圧','電力＝電圧÷電流'], answer:1, exp:'電力（W）＝電圧（V）×電流（A）。100Vで3A流れると消費電力は300W！' },
  { id:337, unit:'g6_electricity', level:'easy',   q:'太陽光発電はどのようなエネルギー変換をするか？', choices:['熱→電気','運動→電気','光→電気','化学→電気'], answer:2, exp:'太陽光発電（光電池）は太陽光のエネルギー（光エネルギー）を直接電気エネルギーに変換するよ！' },
  { id:338, unit:'g6_electricity', level:'normal', q:'変圧器（トランス）はどの電流で使えるか？', choices:['直流のみ','交流のみ','どちらでも','高電圧のみ'], answer:1, exp:'変圧器は電磁誘導の原理を利用するため交流のみ使用可能。発電所から高圧送電→変電所で変圧→家庭に届けるよ！' },
  { id:339, unit:'g6_electricity', level:'normal', q:'送電線で電圧を高くして送電する理由は？', choices:['電流を大きくするため','電力の損失（ロス）を減らすため','安全のため','機器の保護のため'], answer:1, exp:'電力損失（熱になる）＝電流²×抵抗。電圧を高くすると電流を小さくでき送電ロスが大幅に減る！' },
  { id:340, unit:'g6_electricity', level:'normal', q:'水力発電の仕組みを正しく説明したものは？', choices:['水の化学エネルギーを電気に変える','水の位置エネルギー→運動エネルギー→電気エネルギーと変換する','水を電気分解して水素を燃やす','潮の干満を使う'], answer:1, exp:'水力発電：高所のダムの水（位置エネルギー）→タービン回転（運動エネルギー）→発電機（電気エネルギー）！' },
  { id:341, unit:'g6_electricity', level:'hard',   q:'LEDが電球より省エネな理由として最も正確なのは？', choices:['LEDは発熱しない','LEDは電気を光に変える効率が高く熱として無駄になるエネルギーが少ない','LEDは電圧が低い','LEDは材質が違うだけ'], answer:1, exp:'白熱電球は電力の大部分が熱になり光への変換効率は5〜10%。LEDは40〜50%以上が光になり消費電力が約10分の1！' },
  { id:342, unit:'g6_electricity', level:'hard',   q:'燃料電池の仕組みは？', choices:['石炭を燃やして蒸気でタービンを回す','水素と酸素の化学反応で電気を直接取り出す','太陽光で水を電気分解する','原子核分裂で熱を発生させる'], answer:1, exp:'燃料電池：水素（H₂）と酸素（O₂）を反応させて水（H₂O）を作るときに電気を取り出す。排出物は水のみ！' },
  { id:343, unit:'g6_electricity', level:'hard',   q:'100Vで1000Wの電気ストーブを2時間使ったときの電力量は？', choices:['200Wh','1000Wh','2000Wh','4000Wh'], answer:2, exp:'電力量（Wh）＝電力（W）×時間（h）＝1000W×2h＝2000Wh＝2kWh。電気料金の計算の基本！' },

  // ----- g6_ions -----
  { id:344, unit:'g6_ions', level:'easy',   q:'原子が電子を失って正の電荷を持つイオンを何という？', choices:['陰イオン','陽イオン','中性原子','分子'], answer:1, exp:'陽イオン：電子を失って正の電荷を持つイオン。Na⁺（ナトリウムイオン）やH⁺（水素イオン）が代表例！' },
  { id:345, unit:'g6_ions', level:'easy',   q:'電解質とは何か？', choices:['電気を通す金属','水に溶けてイオンに分かれ電気を通す物質','電気を通さない物質','電池の材料'], answer:1, exp:'電解質：水に溶けると電離してイオンになり電気を通す物質。食塩・塩酸・水酸化ナトリウムなどが例！' },
  { id:346, unit:'g6_ions', level:'easy',   q:'塩化銅水溶液を電気分解すると陰極と陽極に何が生じるか？', choices:['陰極：銅、陽極：水素','陰極：銅、陽極：塩素','陰極：塩素、陽極：銅','陰極：水素、陽極：酸素'], answer:1, exp:'塩化銅の電気分解：Cu²⁺が陰極で電子をもらって銅（Cu）が析出、Cl⁻が陽極で電子を渡して塩素（Cl₂）が発生！' },
  { id:347, unit:'g6_ions', level:'easy',   q:'酸性の水溶液に共通して含まれるイオンは？', choices:['OH⁻（水酸化物イオン）','H⁺（水素イオン）','Na⁺（ナトリウムイオン）','Cl⁻（塩化物イオン）'], answer:1, exp:'酸性＝水素イオン（H⁺）が多い状態。HClは電離してH⁺とCl⁻に分かれる。H⁺が酸性の正体！' },
  { id:348, unit:'g6_ions', level:'easy',   q:'アルカリ性の水溶液に共通して含まれるイオンは？', choices:['H⁺','OH⁻（水酸化物イオン）','Na⁺','Cl⁻'], answer:1, exp:'アルカリ性＝水酸化物イオン（OH⁻）が多い状態。NaOHはNa⁺とOH⁻に電離する。OH⁻がアルカリ性の正体！' },
  { id:349, unit:'g6_ions', level:'normal', q:'NaCl（食塩）が水に溶けると何が起きるか？', choices:['何も変わらない','Na⁺とCl⁻に電離する','NaとClに分解する','NaClのまま水中を動く'], answer:1, exp:'電離：NaCl→Na⁺+Cl⁻。食塩は水中でイオンに分かれる（電離）。イオンが電気を運ぶので食塩水は電気を通す！' },
  { id:350, unit:'g6_ions', level:'normal', q:'水の電気分解で陰極から発生するのは？', choices:['酸素','塩素','水素','窒素'], answer:2, exp:'水の電気分解：2H₂O→2H₂（陰極）＋O₂（陽極）。「陰水陽酸（いんすいようさん）」と覚えよう！' },
  { id:351, unit:'g6_ions', level:'normal', q:'中和反応でH⁺とOH⁻が合わさると何が生成されるか？', choices:['塩（えん）','H₂O（水）','CO₂','O₂'], answer:1, exp:'H⁺＋OH⁻→H₂O。中和で水が生成される。同時に陰イオンと陽イオンが結びついて塩（えん）が生成！' },
  { id:352, unit:'g6_ions', level:'hard',   q:'陰イオンが陽極に引き寄せられる理由は？', choices:['陰イオンと陽極は同じ電荷だから','異種の電荷が引き合うから（陰イオン＝負、陽極＝正）','陰イオンが重いから','磁力の影響'], answer:1, exp:'クーロンの法則：異種の電荷は引き合う。陰イオン（負）は正の電荷を持つ陽極に引き寄せられ、電子を渡す酸化反応が起きる！' },
  { id:353, unit:'g6_ions', level:'hard',   q:'pH7より小さいと酸性、7より大きいとアルカリ性、7は中性。HClとNaOHを等量混ぜると？', choices:['酸性のまま','アルカリ性になる','中性（pH≒7）になる','pH0になる'], answer:2, exp:'等モルのHClとNaOHを混ぜると完全中和：HCl＋NaOH→NaCl＋H₂O。H⁺とOH⁻が打ち消しあいpH≒7（中性）に！' },
  { id:354, unit:'g6_ions', level:'hard',   q:'電気分解と電池（ガルバニ電池）の違いは？', choices:['電気分解は電気を使って化学反応を起こす。電池は化学反応で電気を取り出す','どちらも電気を作る','電気分解は自然に起きる','電池は電気を使う'], answer:0, exp:'電気分解：電気エネルギー→化学エネルギー（電気で強制的に反応）。電池：化学エネルギー→電気エネルギー（自発的な酸化還元反応）！' },

  // ----- g6_energy -----
  { id:355, unit:'g6_energy', level:'easy',   q:'動いている物体がもつエネルギーを何という？', choices:['位置エネルギー','運動エネルギー','熱エネルギー','弾性エネルギー'], answer:1, exp:'運動エネルギー：動く物体がもつエネルギー。速さが大きいほど、質量が大きいほど大きくなる！' },
  { id:356, unit:'g6_energy', level:'easy',   q:'高い場所にある物体がもつエネルギーを何という？', choices:['運動エネルギー','弾性エネルギー','位置エネルギー','化学エネルギー'], answer:2, exp:'位置エネルギー：高い場所にあるほど、重いほど大きい。落下すると運動エネルギーに変換されるよ！' },
  { id:357, unit:'g6_energy', level:'easy',   q:'エネルギーはいろいろな形に変換されるが総量は変わらないという法則は？', choices:['慣性の法則','エネルギー保存の法則','万有引力の法則','フックの法則'], answer:1, exp:'エネルギー保存の法則：エネルギーはさまざまな形（運動・熱・光・化学など）に変換されるが総量は常に一定！' },
  { id:358, unit:'g6_energy', level:'easy',   q:'熱が固体を通じて伝わる現象を何という？', choices:['対流','放射','伝導（熱伝導）','蒸発'], answer:2, exp:'熱伝導：固体などを通じて高温部から低温部へ熱が直接伝わること。金属は熱伝導が大きく、木は小さい！' },
  { id:359, unit:'g6_energy', level:'easy',   q:'食料や燃料が化学反応によって放出できるエネルギーを何という？', choices:['核エネルギー','電気エネルギー','化学エネルギー','位置エネルギー'], answer:2, exp:'化学エネルギー：化学結合に蓄えられたエネルギー。食物・燃料・電池に含まれ、燃焼や消化で取り出せる！' },
  { id:360, unit:'g6_energy', level:'normal', q:'振り子が最高点にきたとき、エネルギーはどの状態か？', choices:['運動エネルギー最大、位置エネルギー最小','位置エネルギー最大、運動エネルギー最小（速度ゼロ）','両方最大','両方最小'], answer:1, exp:'振り子の最高点（折り返し点）：速度がゼロなので運動エネルギー最小（＝0）、高さが最大で位置エネルギーが最大！' },
  { id:361, unit:'g6_energy', level:'normal', q:'1秒間に行う仕事の量を何という？', choices:['仕事量','電力','仕事率（パワー）','エネルギー'], answer:2, exp:'仕事率（W）＝仕事（J）÷時間（s）。単位はワット（W）。1秒で1Jの仕事をする能力が1W！' },
  { id:362, unit:'g6_energy', level:'normal', q:'熱が流体（空気・水）の流れで伝わる現象を何という？', choices:['伝導','放射','対流','蒸発'], answer:2, exp:'対流：温められた流体が上昇し冷えた流体が下降することで熱が伝わる。暖房・鍋の中の水・海流も対流！' },
  { id:363, unit:'g6_energy', level:'hard',   q:'機械の効率が100%にならない最大の理由は？', choices:['機械は仕事をできない','摩擦や空気抵抗で一部のエネルギーが熱になり有効な仕事に使えなくなるから','エネルギーが消滅するから','入力エネルギーが不足するから'], answer:1, exp:'摩擦・空気抵抗で運動エネルギーの一部が熱になる。熱は散逸して元の目的の仕事には使えなくなる。これが効率＜100%の理由！' },
  { id:364, unit:'g6_energy', level:'hard',   q:'空気抵抗がない場合、異なる質量の物体を同じ高さから落とすと地面の速さはどうなる？', choices:['重い方が速い','軽い方が速い','質量に関わらず同じ速さ','落下する高さで変わる'], answer:2, exp:'ガリレオの実験：真空中ではすべての物体が同じ重力加速度（g≒9.8m/s²）で落下するため質量によらず同じ速さ！' },
  { id:365, unit:'g6_energy', level:'hard',   q:'熱機関（蒸気機関・エンジン）のカルノー効率が100%にならない理由は？', choices:['燃料が不純物を含むから','熱力学第2法則により高温→低温の熱移動の一部しか仕事に変換できないから','摩擦だけが原因','エンジンの設計が悪いから'], answer:1, exp:'熱力学第2法則：熱は自然には低温から高温へ移らない。熱機関は高温→低温への熱の一部しか仕事に変換できず、残りは廃熱になる！' },

  // ----- g6_evolution -----
  { id:366, unit:'g6_evolution', level:'easy',   q:'生物が長い年月をかけて形質を変化させることを何という？', choices:['適応','変異','進化','遺伝'], answer:2, exp:'進化：生物が世代を超えて遺伝子レベルで変化し、形質が変わること。数百万〜数億年単位の長い変化！' },
  { id:367, unit:'g6_evolution', level:'easy',   q:'すべての生物は共通の祖先から進化したという考えを何という？', choices:['創造説','共通祖先説','突然変異説','適応放散説'], answer:1, exp:'共通祖先説：現存する全生物が共通の祖先から枝分かれして進化したという考え。遺伝子・化石・形態が証拠！' },
  { id:368, unit:'g6_evolution', level:'easy',   q:'植物が光エネルギーで有機物を作るはたらきは？', choices:['呼吸','蒸散','光合成','発酵'], answer:2, exp:'光合成：CO₂＋H₂O＋光エネルギー→有機物（糖）＋O₂。葉の葉緑体で行われ、地球上の生命のエネルギー源！' },
  { id:369, unit:'g6_evolution', level:'easy',   q:'菌類や細菌など、有機物を無機物に分解する生き物を何というか？', choices:['生産者','消費者','分解者','捕食者'], answer:2, exp:'分解者：キノコなどの菌類・細菌が死んだ生物の有機物を無機物に分解し、物質を循環させる大切な役割！' },
  { id:370, unit:'g6_evolution', level:'easy',   q:'生物が食べる・食べられる関係で連なる系列を何という？', choices:['生態系','生物圏','食物連鎖','物質循環'], answer:2, exp:'食物連鎖：生産者→消費者（草食）→消費者（肉食）と連なるエネルギーの流れ。実際は食物網を形成する！' },
  { id:371, unit:'g6_evolution', level:'normal', q:'形は違っても同じ祖先から進化した器官を何という？（鳥の翼とクジラの胸びれ）', choices:['痕跡器官','相同器官','適応器官','同型器官'], answer:1, exp:'相同器官：形や機能が異なっても、同じ祖先の同じ器官から進化した器官。共通祖先の証拠になる！' },
  { id:372, unit:'g6_evolution', level:'normal', q:'進化の過程で機能を失い痕跡だけ残る器官を何という？', choices:['相同器官','痕跡器官','発生器官','変態器官'], answer:1, exp:'痕跡器官：進化の過程で機能が退化した器官。人の尾骨・クジラの後肢の骨などが例！共通祖先の証拠！' },
  { id:373, unit:'g6_evolution', level:'normal', q:'生物と環境、生物間の相互作用すべてをまとめた仕組みを何という？', choices:['食物連鎖','生物群落','生態系','個体群'], answer:2, exp:'生態系：生物と非生物的環境（気温・水・土壌など）・生物間の相互関係をまとめたシステム。森・海・草原など！' },
  { id:374, unit:'g6_evolution', level:'hard',   q:'自然選択（しぜんせんたく）の仕組みを正しく説明したものは？', choices:['環境に合った形質を持つ個体が生存・繁殖しやすく、その形質が子孫に広まる','すべての個体が同じように変化する','突然変異だけで進化が起きる','人間が選んだ形質だけが残る'], answer:0, exp:'自然選択（ダーウィン）：変異→環境に適した形質が有利→生存・繁殖しやすい→その形質が世代を経て広まる！' },
  { id:375, unit:'g6_evolution', level:'hard',   q:'ガラパゴスのフィンチの多様なくちばしは何の例か？', choices:['収斂進化','痕跡器官','適応放散（共通祖先から多様な環境へ適応進化）','自然選択のみ'], answer:2, exp:'適応放散：共通祖先から多様な環境（食物）に応じて異なる形質を持つ種に分化。ガラパゴスフィンチが典型例！' },
  { id:376, unit:'g6_evolution', level:'hard',   q:'現在の生物絶滅の最大の原因は何か？', choices:['自然変動（気候変動）','小惑星衝突','人間活動による生息地破壊・乱獲・外来種導入','病気の蔓延'], answer:2, exp:'現代の大量絶滅（第6次絶滅）は人間活動が主因。森林破壊・乱獲・汚染・外来種・温暖化が生物多様性を急速に失わせている！' },

  // ----- g6_review -----
  { id:377, unit:'g6_review', level:'easy',   q:'植物の葉の気孔から水蒸気を放出するはたらきを何という？', choices:['光合成','呼吸','蒸散','発芽'], answer:2, exp:'蒸散：葉の気孔から水蒸気が放出されることで根から水が吸い上げられ、植物全体に水が行き渡るよ！' },
  { id:378, unit:'g6_review', level:'easy',   q:'塩酸（HCl）を青リトマス紙につけると何色になる？', choices:['青のまま','赤','緑','紫'], answer:1, exp:'酸性の水溶液は青リトマス紙を赤に変える。塩酸は強酸性なので確実に赤くなる。アルカリ性は赤→青！' },
  { id:379, unit:'g6_review', level:'easy',   q:'コイルに磁石を近づけたり遠ざけることで電流が生じる現象を何という？', choices:['静電気','電磁誘導','電気分解','電磁石'], answer:1, exp:'電磁誘導：コイルの磁束が変化すると起電力が生じ電流が流れる。発電機・変圧器の原理！' },
  { id:380, unit:'g6_review', level:'easy',   q:'マグニチュードと震度の違いで正しいのは？', choices:['両方とも場所によって変わる','マグニチュードは地震の規模（1つ）、震度は観測地点ごとに異なる揺れの強さ','両方とも1つの地震に1つ','マグニチュードが場所ごとに異なる'], answer:1, exp:'マグニチュード：地震全体のエネルギー（1つ）。震度：各地点での揺れの大きさ（震源に近いほど大きい）！' },
  { id:381, unit:'g6_review', level:'easy',   q:'酸性とアルカリ性の水溶液を混ぜると何が起きる？', choices:['爆発する','中和反応が起きて水と塩が生成される','何も起きない','溶媒だけが残る'], answer:1, exp:'中和：H⁺＋OH⁻→H₂O。同時に塩（えん）が生成される。BTB溶液で色が変わるのを確認できるよ！' },
  { id:382, unit:'g6_review', level:'easy',   q:'進化の最も直接的な証拠は？', choices:['現在の生物の多様性','化石の記録（地層ごとの形質変化）','生物が環境に適応していること','痕跡器官の存在'], answer:1, exp:'化石：地層の時代順に形質の変化が記録されている。ウマの祖先からの段階的変化など、進化の直接的証拠！' },
  { id:383, unit:'g6_review', level:'normal', q:'支点から力点30cm・作用点10cmのてこで、作用点に60Nがかかるとき力点に必要な力は？', choices:['60N','20N','180N','30N'], answer:1, exp:'モーメントのつり合い：力点の力×30cm＝60N×10cm。力点の力＝600÷30＝20N！支点から遠いほど小さな力でよい！' },
  { id:384, unit:'g6_review', level:'normal', q:'水の電気分解で陰極から水素、陽極から酸素が発生するとき、体積比は？', choices:['水素：酸素＝1:2','水素：酸素＝2:1','水素：酸素＝1:1','水素：酸素＝3:1'], answer:1, exp:'水の電気分解：2H₂O→2H₂＋O₂。水素2モルに対し酸素1モルが発生。体積比は水素:酸素＝2:1！' },
  { id:385, unit:'g6_review', level:'normal', q:'生態系の「生産者・消費者・分解者」で正しい対応は？', choices:['生産者：動物、消費者：植物、分解者：菌類','生産者：植物（光合成）、消費者：動物、分解者：菌類・細菌','生産者：菌類、消費者：植物、分解者：動物','すべて同じはたらき'], answer:1, exp:'生態系のエネルギー流：生産者（植物）が光合成→消費者（動物）が食べる→分解者（菌・細菌）が分解して循環！' },
  { id:386, unit:'g6_review', level:'hard',   q:'電磁誘導で発生する電流を大きくする方法として正しいものをすべて含む選択肢は？', choices:['コイルを少なくする','磁石を速く動かす・コイルの巻き数を増やす・強い磁石を使う','電流を外から流す','コイルを水平にする'], answer:1, exp:'誘導起電力を大きくする3条件：①磁石を速く動かす（変化を速くする）②コイルの巻き数を増やす③強い磁石を使う！' },
  { id:387, unit:'g6_review', level:'hard',   q:'酸性雨の原因と影響で正しいのは？', choices:['CO₂だけが原因で砂漠化する','化石燃料燃焼のNO₂・SO₂が雨水に溶けて硝酸・硫酸になり、川・湖の酸性化や建築物の腐食を引き起こす','オゾン層破壊が直接の原因','降雨量が減少するだけ'], answer:1, exp:'酸性雨：石炭・石油燃焼→NO₂・SO₂→大気中で水と反応→硝酸（HNO₃）・硫酸（H₂SO₄）として降下。生態系・建築物を傷める！' },
  { id:388, unit:'g6_review', level:'hard',   q:'光合成・発電機・燃料電池のエネルギー変換を正しく説明したものは？', choices:['光合成：光→電気、発電機：化学→電気、燃料電池：運動→電気','光合成：光→化学（有機物）、発電機：運動→電気、燃料電池：化学（水素）→電気','どれも熱→電気の変換','光合成：光→熱、発電機：光→電気、燃料電池：熱→電気'], answer:1, exp:'光合成（光→化学）・発電機（運動→電気）・燃料電池（化学H₂→電気）。3つのエネルギー変換をセットで覚えよう！' },

  // ----- g6_earthquake -----
  { id:153, unit:'g6_earthquake', level:'easy',   q:'地震が発生する場所（震源）から波が伝わるとき、最初に届く速い波の名前は？', choices:['S波','P波','L波','R波'], answer:1, exp:'P波（Primary wave/縦波）が先に到着→小さな初期微動。後からS波（Secondary wave/横波）→大きな主要動！' },
  { id:154, unit:'g6_earthquake', level:'easy',   q:'火山が噴火するとき、地下から出てくる溶けた岩石を何という？', choices:['鉱物','溶岩（地上）・マグマ（地下）','石英','玄武岩'], answer:1, exp:'地下にあるときはマグマ、地表に出たら溶岩。マグマが固まると火成岩になるよ！' },

const STATE_KEY = 'rikalab_state_v1';

const defaultState = () => ({
  streakDays: 0,
  lastPlayDate: null,
  totalCorrect: 0,
  totalAnswered: 0,
  unlockedBadges: [],
  newBadges: [],
  unitProgress: {},  // { unitId: { easy: cleared, normal: cleared, hard: cleared } }
  pointsViewed: [],
  installPrompted: false,
});

let _state = defaultState();

function loadState() {
  try {
    const saved = localStorage.getItem(STATE_KEY);
    if (saved) {
      _state = { ...defaultState(), ...JSON.parse(saved) };
    }
  } catch (e) {
    _state = defaultState();
  }
  // Update streak
  const today = new Date().toDateString();
  if (_state.lastPlayDate) {
    const last = new Date(_state.lastPlayDate);
    const now = new Date();
    const diffDays = Math.floor((now - last) / 86400000);
    if (diffDays === 1) {
      _state.streakDays++;
    } else if (diffDays > 1) {
      _state.streakDays = 1;
    }
  } else {
    _state.streakDays = 1;
  }
  _state.lastPlayDate = today;
  saveState();
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify(_state));
  } catch (e) {}
}

function getState() { return _state; }

function markUnitCleared(unitId, level) {
  if (!_state.unitProgress[unitId]) _state.unitProgress[unitId] = {};
  _state.unitProgress[unitId][level] = true;
  saveState();
}

function unlockBadge(badgeId) {
  if (_state.unlockedBadges.includes(badgeId)) return false;
  _state.unlockedBadges.push(badgeId);
  _state.newBadges.push(badgeId);
  saveState();
  return true;
}

function clearNewBadge(badgeId) {
  _state.newBadges = _state.newBadges.filter(b => b !== badgeId);
  saveState();
}

function checkAndUnlockBadges(context) {
  const earned = [];
  const { score, total, unitId, level, isRandom, timePerQuestion, hour } = context;
  
  // first clear
  if (!_state.unlockedBadges.includes('first_clear')) {
    if (unlockBadge('first_clear')) earned.push('first_clear');
  }
  // perfect
  if (score === total && unlockBadge('perfect')) earned.push('perfect');
  // streak
  if (_state.streakDays >= 3 && unlockBadge('streak3')) earned.push('streak3');
  if (_state.streakDays >= 7 && unlockBadge('streak7')) earned.push('streak7');
  // time-based
  if (hour !== undefined) {
    if (hour < 6 && unlockBadge('early_bird')) earned.push('early_bird');
    if (hour >= 22 && unlockBadge('night_owl')) earned.push('night_owl');
  }
  // speed
  if (timePerQuestion && timePerQuestion < 10 && score === total && unlockBadge('speed_star')) {
    earned.push('speed_star');
  }
  // hard
  if (level === 'hard' && score === total && unlockBadge('hard_first')) earned.push('hard_first');
  // random master
  if (isRandom && score === total && unlockBadge('random_master')) earned.push('random_master');
  // collector - check all units cleared
  const allCleared = UNITS.every(u => {
    const p = _state.unitProgress[u.id];
    return p && (p.easy || p.normal || p.hard);
  });
  if (allCleared && unlockBadge('collector')) earned.push('collector');
  // hidden: stars perfect
  if ((unitId === 'g6_stars' || unitId === 'g5_celestial') && score === total && unlockBadge('hidden3')) earned.push('hidden3');
  
  return earned;
}

  // 問題が存在しない単元のとき、ホーム画面に戻してトーストを表示
  showScreen('screen-home');

  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function startQuiz(unitId, level, isRandom) {
  // Build question pool
  let pool;
  const KEYS = ['A', 'B', 'C', 'D'];
  
  if (isRandom) {
    const easy   = QUESTIONS.filter(q => q.level === 'easy');
    const normal = QUESTIONS.filter(q => q.level === 'normal');
    const hard   = QUESTIONS.filter(q => q.level === 'hard');
    pool = [
      ...shuffle(easy).slice(0, 4),
      ...shuffle(normal).slice(0, 4),
      ...shuffle(hard).slice(0, 2),
    ];
    pool = shuffle(pool).slice(0, 10);
  } else {
    pool = shuffle(QUESTIONS.filter(q => q.unit === unitId && q.level === level)).slice(0, 5);
    if (pool.length === 0) {
      // Fall back to any level if not enough
      pool = shuffle(QUESTIONS.filter(q => q.unit === unitId)).slice(0, 5);
    }
    // 問題が見つからない場合は「準備中」メッセージを表示して終了
    if (pool.length === 0) {
      const unit = UNITS.find(u => u.id === unitId);
      const unitName = unit ? unit.name : unitId;
      showNotReadyMessage(unitName);
      return;
    }
  }
  
  quizSession = {
    questions: pool,
    current: 0,
    score: 0,
    unitId,
    level,
    isRandom,
    startTime: Date.now(),
    questionStartTime: Date.now(),
    times: [],
    answered: false,
  };
  
  showScreen('screen-quiz');
  document.getElementById('bottom-nav').style.display = 'none';
  renderQuestion();
}

  const s = quizSession;
